<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafeCurrent - Operational SAR Map</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.heat/dist/leaflet-heat.js"></script>

    <style>
        body { margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; height: 100vh; background: #121212; color: white; }
        #sidebar { width: 320px; padding: 25px; background: #1e1e1e; display: flex; flex-direction: column; gap: 18px; box-shadow: 4px 0 15px rgba(0,0,0,0.6); z-index: 1000; box-sizing: border-box; overflow-y: auto; }
        #map { flex-grow: 1; height: 100%; }
        h2 { margin: 0; color: #00ffcc; font-size: 24px; letter-spacing: 1px; }
        p { margin: 0; font-size: 14px; color: #ccc; line-height: 1.4; }
        .input-group { display: flex; flex-direction: column; gap: 6px; }
        label { font-size: 12px; color: #00ffcc; font-weight: bold; text-transform: uppercase; }
        input, select { width: 100%; box-sizing: border-box; padding: 12px; background: #2a2a2a; color: white; border: 1px solid #3d3d3d; border-radius: 6px; font-size: 14px; }
        input:focus, select:focus { border-color: #00ffcc; outline: none; }
        input[readonly] { color: #d8d8d8; background: #252525; }
        button { padding: 14px; border-radius: 6px; border: none; font-size: 15px; font-weight: bold; background: #00ffcc; color: #121212; cursor: pointer; transition: all 0.2s ease-in-out; }
        button:hover { background: #00ddbb; transform: translateY(-1px); }
        button:disabled { cursor: wait; opacity: 0.7; transform: none; }
        .pick-location-button {
            width: 52px;
            height: 52px;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #2a2a2a;
            border: 1px solid #ff4b45;
        }
        .pick-location-button:hover { background: #352323; }
        .pick-location-button.active {
            background: rgba(255, 75, 69, 0.18);
            border-color: #ff4b45;
            box-shadow: 0 0 0 2px rgba(255, 75, 69, 0.25);
        }
        .map-tool-row { display: flex; align-items: stretch; gap: 10px; }
        .map-pin-icon {
            width: 24px;
            height: 24px;
            position: relative;
            background: #ef2f2f;
            border-radius: 50% 50% 50% 0;
            transform: rotate(-45deg);
            box-shadow: 2px 2px 5px rgba(0, 0, 0, 0.35);
        }
        .map-pin-icon::after {
            content: "";
            width: 10px;
            height: 10px;
            position: absolute;
            top: 7px;
            left: 7px;
            border-radius: 50%;
            background: #fff;
        }
        .polygon-icon {
            width: 26px;
            height: 24px;
            display: block;
            background: rgba(0, 255, 204, 0.22);
            border: 3px solid #00ffcc;
            clip-path: polygon(50% 0, 100% 38%, 82% 100%, 18% 100%, 0 38%);
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.35);
        }
        #pick-polygon-button {
            border-color: #00ffcc;
        }
        #pick-polygon-button:hover { background: #1d3732; }
        #pick-polygon-button.active {
            background: rgba(0, 255, 204, 0.16);
            box-shadow: 0 0 0 2px rgba(0, 255, 204, 0.22);
        }
        .polygon-info {
            display: grid;
            flex: 1;
            min-width: 0;
            gap: 6px;
            padding: 10px 12px;
            border: 1px solid rgba(0, 255, 204, 0.28);
            border-radius: 6px;
            background: rgba(0, 255, 204, 0.07);
        }
        .polygon-info-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            font-size: 12px;
            color: #cfcfcf;
        }
        .polygon-info-row strong {
            color: #ffffff;
            font-size: 13px;
            text-align: right;
            white-space: nowrap;
        }
        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border: 0;
        }
        .hidden { display: none; }
        .time-row { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px; }
        .elapsed-row { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 8px; }
        .date-row { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 8px; }
        .time-field { display: flex; flex-direction: column; gap: 6px; min-width: 0; }
        #time-input-group { gap: 10px; }
        .beach-label {
            color: #ffffff;
            font-size: 12px;
            font-weight: 700;
            line-height: 1.2;
            white-space: nowrap;
            padding: 3px 7px;
            border-radius: 4px;
            background: rgba(0, 0, 0, 0.55);
            border: 1px solid rgba(0, 255, 204, 0.45);
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.9);
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.35);
            transform: translate(-50%, -50%);
        }
        .loading-indicator {
            display: flex;
            align-items: center;
            gap: 10px;
            min-height: 44px;
            padding: 10px 12px;
            border: 1px solid rgba(0, 255, 204, 0.35);
            border-radius: 6px;
            background: rgba(0, 255, 204, 0.08);
            color: #d8fff8;
            font-size: 13px;
            font-weight: 600;
        }
        .loading-indicator.hidden { display: none; }
        .loading-spinner {
            width: 24px;
            height: 24px;
            border: 3px solid rgba(255, 255, 255, 0.25);
            border-top-color: #00ffcc;
            border-radius: 50%;
            animation: loading-spin 0.8s linear infinite;
            flex: 0 0 auto;
        }
        @keyframes loading-spin {
            to { transform: rotate(360deg); }
        }
        #status-message { min-height: 18px; font-size: 12px; color: #aaa; }
        #status-message.error { color: #ff7676; }
        .footer { margin-top: auto; font-size: 11px; color: #666; border-top: 1px solid #333; padding-top: 15px; }
    </style>
</head>
<body>

    <div id="sidebar">
        <h2>SafeCurrent UI</h2>
        <p><strong>Operational Instruction:</strong><br>Enter coordinates manually or press Pick From Map, then click the sea area to set the Last Seen Marker.</p>
        
        <div class="map-tool-row">
            <button id="pick-location-button" class="pick-location-button" onclick="togglePickLocationMode()" type="button" aria-label="Pick location from map" title="Pick location from map">
                <span class="map-pin-icon" aria-hidden="true"></span>
                <span class="sr-only">Pick location from map</span>
            </button>
            <button id="pick-polygon-button" class="pick-location-button" onclick="togglePolygonMode()" type="button" aria-label="Draw area on map" title="Draw area on map">
                <span class="polygon-icon" aria-hidden="true"></span>
                <span class="sr-only">Draw area on map</span>
            </button>
            <div id="polygon-info" class="polygon-info hidden" aria-live="polite">
                <div class="polygon-info-row">
                    <span>Area</span>
                    <strong id="polygon-area-value">--</strong>
                </div>
                <div class="polygon-info-row">
                    <span>Perimeter</span>
                    <strong id="polygon-perimeter-value">--</strong>
                </div>
                <div class="polygon-info-row">
                    <span>Points</span>
                    <strong id="polygon-points-value">0</strong>
                </div>
            </div>
        </div>
        <div class="input-group">
            <label for="lat">Latitude</label>
            <input type="number" id="lat" value="32.0800" min="-90" max="90" step="0.0001">
        </div>
        <div class="input-group">
            <label for="lon">Longitude</label>
            <input type="number" id="lon" value="34.7650" min="-180" max="180" step="0.0001">
        </div>
        <div class="input-group">
            <div class="time-row">
                <div class="time-field">
                    <label for="weight">Weight</label>
                    <input type="number" id="weight" value="70" min="1" max="300" step="0.1">
                </div>
                <div class="time-field">
                    <label for="age">Age</label>
                    <input type="number" id="age" value="30" min="0" max="120" step="1">
                </div>
            </div>
        </div>
        <div class="input-group">
            <label for="drowning-mode">Drowning Time Input</label>
            <select id="drowning-mode" onchange="updateDrowningInputVisibility()">
                <option value="elapsed">Time Since Drowning</option>
                <option value="time">Time of Drowning</option>
            </select>
        </div>
        <div class="input-group drowning-input" id="elapsed-input-group">
            <div class="elapsed-row">
                <div class="time-field">
                    <label for="days">Days</label>
                    <input type="number" id="days" value="0" min="0" max="7" step="1">
                </div>
                <div class="time-field">
                    <label for="hours">Hours</label>
                    <input type="number" id="hours" value="4" min="0" max="23" step="1">
                </div>
                <div class="time-field">
                    <label for="minutes">Minutes</label>
                    <input type="number" id="minutes" value="0" min="0" max="59" step="1">
                </div>
            </div>
        </div>
        <div class="input-group drowning-input hidden" id="time-input-group">
            <div class="time-field">
                <label for="drowning-calendar">Calendar</label>
                <input type="date" id="drowning-calendar" onchange="setManualDateFromCalendar()">
            </div>
            <div class="date-row">
                <div class="time-field">
                    <label for="drowning-day">Day</label>
                    <input type="number" id="drowning-day" min="1" max="31" step="1" oninput="handleManualDateInput()">
                </div>
                <div class="time-field">
                    <label for="drowning-month">Month</label>
                    <input type="number" id="drowning-month" min="1" max="12" step="1" readonly>
                </div>
                <div class="time-field">
                    <label for="drowning-year">Year</label>
                    <input type="text" id="drowning-year" inputmode="numeric" maxlength="4" readonly>
                </div>
            </div>
            <div class="time-field">
                <label for="drowning-time">Time</label>
                <input type="time" id="drowning-time" step="60">
            </div>
        </div>
        
        <button id="simulate-button" onclick="triggerSimulation()">Recalculate Current Points</button>
        <div id="loading-indicator" class="loading-indicator hidden" role="status" aria-live="polite">
            <div class="loading-spinner" aria-hidden="true"></div>
            <span>Calculating drift...</span>
        </div>
        <div id="status-message" role="status">Ready</div>

        <div class="footer">
            System Status: Connected<br>
            Live Feed: Open-Meteo / Copernicus Marine Backup
        </div>
    </div>

    <div id="map"></div>

    <script>
        // Initialize map on Israel Coast
        const map = L.map('map').setView([32.0800, 34.7650], 12);
        
        map.createPane('labels');
        map.getPane('labels').style.zIndex = 650;
        map.getPane('labels').style.pointerEvents = 'none';

        const satelliteLayer = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
            attribution: 'Tiles &copy; Esri',
            maxZoom: 20,
            maxNativeZoom: 19
        }).addTo(map);

        const labelLayer = L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager_only_labels/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap contributors &copy; CARTO',
            subdomains: 'abcd',
            maxZoom: 20,
            pane: 'labels'
        }).addTo(map);

        const beachLabelLayer = L.layerGroup().addTo(map);
        let beachLabelAbortController = null;
        let lastBeachLabelBounds = null;
        const curatedBeachLabels = [
            {key: 'tzuk', name: 'Tzuk Beach', lat: 32.1288, lon: 34.7898},
            {key: 'tel-baruch', name: 'Tel Baruch Beach', lat: 32.1194, lon: 34.7848},
            {key: 'metsitsim', name: 'Metsitsim Beach', lat: 32.0967, lon: 34.7737},
            {key: 'nordau', name: 'Nordau Beach', lat: 32.0925, lon: 34.7719},
            {key: 'hilton', name: 'Hilton Beach', lat: 32.0887, lon: 34.7699},
            {key: 'gordon', name: 'Gordon Beach', lat: 32.0835, lon: 34.7673},
            {key: 'frishman', name: 'Frishman Beach', lat: 32.0798, lon: 34.7651},
            {key: 'bograshov', name: 'Bograshov Beach', lat: 32.0770, lon: 34.7640},
            {key: 'jerusalem', name: 'Jerusalem Beach', lat: 32.0738, lon: 34.7625},
            {key: 'banana', name: 'Banana Beach', lat: 32.0693, lon: 34.7604},
            {key: 'charles-clore', name: 'Charles Clore Beach', lat: 32.0649, lon: 34.7586},
            {key: 'alma', name: 'Alma Beach', lat: 32.0596, lon: 34.7565},
            {key: 'jaffa', name: 'Jaffa Beach', lat: 32.0540, lon: 34.7539},
            {key: 'givat-aliyah', name: 'Givat Aliyah Beach', lat: 32.0357, lon: 34.7466}
        ];
        const beachNameAliases = new Map([
            ['tzuk', 'tzuk'],
            ['הצוק', 'tzuk'],
            ['telbaruch', 'tel-baruch'],
            ['תלברוך', 'tel-baruch'],
            ['metsitsim', 'metsitsim'],
            ['metzitzim', 'metsitsim'],
            ['מציצים', 'metsitsim'],
            ['nordau', 'nordau'],
            ['נורדאו', 'nordau'],
            ['hilton', 'hilton'],
            ['הילטון', 'hilton'],
            ['gordon', 'gordon'],
            ['גורדון', 'gordon'],
            ['frishman', 'frishman'],
            ['פרישמן', 'frishman'],
            ['bograshov', 'bograshov'],
            ['בוגרשוב', 'bograshov'],
            ['jerusalem', 'jerusalem'],
            ['ירושלים', 'jerusalem'],
            ['banana', 'banana'],
            ['בננה', 'banana'],
            ['charlesclore', 'charles-clore'],
            ['צארלסקלור', 'charles-clore'],
            ['alma', 'alma'],
            ['עלמה', 'alma'],
            ['jaffa', 'jaffa'],
            ['יפו', 'jaffa'],
            ['givataliyah', 'givat-aliyah'],
            ['גבעתעליה', 'givat-aliyah'],
            ['גבעתעלייה', 'givat-aliyah']
        ]);

        L.control.layers(
            {"Satellite": satelliteLayer},
            {
                "City labels": labelLayer,
                "Beach names": beachLabelLayer
            },
            {collapsed: true}
        ).addTo(map);

        let pathLine = null;
        let startMarker = null;
        let heatLayer = null;
        let areaPathLayer = null;
        let finalAreaPolygon = null;
        let isPickingLocation = false;
        let isDrawingPolygon = false;
        let selectedPolygon = null;
        let polygonDraftLine = null;
        let polygonVertexMarkers = [];
        let polygonPoints = [];
        const API_BASE_URL = 'http://127.0.0.1:8000';
        const MAX_SIMULATION_DAYS = 7;
        const MAX_SIMULATION_HOURS = MAX_SIMULATION_DAYS * 24;

        function toLocalDateTimeParts(date) {
            const localDate = new Date(date.getTime() - date.getTimezoneOffset() * 60000);
            const value = localDate.toISOString().slice(0, 16);
            const dateValue = value.slice(0, 10);
            const [year, month, day] = dateValue.split('-').map(Number);

            return {
                date: dateValue,
                time: value.slice(11, 16),
                year,
                month,
                day
            };
        }

        function toDateInputValue(parts) {
            const year = String(parts.year).padStart(4, '0');
            const month = String(parts.month).padStart(2, '0');
            const day = String(parts.day).padStart(2, '0');
            return `${year}-${month}-${day}`;
        }

        function setStatus(message, isError = false) {
            const statusMessage = document.getElementById('status-message');
            statusMessage.textContent = message;
            statusMessage.classList.toggle('error', isError);
        }

        function setLoading(isLoading) {
            document.getElementById('loading-indicator').classList.toggle('hidden', !isLoading);
            document.getElementById('simulate-button').disabled = isLoading;
            document.getElementById('pick-location-button').disabled = isLoading;
            document.getElementById('pick-polygon-button').disabled = isLoading;
        }

        function getSelectedPosition() {
            const lat = Number(document.getElementById('lat').value);
            const lon = Number(document.getElementById('lon').value);

            if (!Number.isFinite(lat) || lat < -90 || lat > 90) {
                throw new Error('Enter a valid latitude between -90 and 90.');
            }

            if (!Number.isFinite(lon) || lon < -180 || lon > 180) {
                throw new Error('Enter a valid longitude between -180 and 180.');
            }

            return {lat, lon};
        }

        function setLastSeenMarker(lat, lon, title = 'Last Seen Point') {
            if (startMarker) map.removeLayer(startMarker);

            startMarker = L.marker([lat, lon]).addTo(map)
                .bindPopup(`<b>${title}</b><br>Calculating drift vectors...`).openPopup();
        }

        function clearAreaResultLayers() {
            if (areaPathLayer) {
                map.removeLayer(areaPathLayer);
                areaPathLayer = null;
            }

            if (finalAreaPolygon) {
                map.removeLayer(finalAreaPolygon);
                finalAreaPolygon = null;
            }
        }

        function formatArea(areaSqMeters) {
            if (areaSqMeters >= 1000000) {
                return `${(areaSqMeters / 1000000).toFixed(2)} km2`;
            }

            return `${Math.round(areaSqMeters).toLocaleString()} m2`;
        }

        function formatDistance(distanceMeters) {
            if (distanceMeters >= 1000) {
                return `${(distanceMeters / 1000).toFixed(2)} km`;
            }

            return `${Math.round(distanceMeters).toLocaleString()} m`;
        }

        function getDistanceMeters(pointA, pointB) {
            const earthRadiusMeters = 6371000;
            const lat1 = pointA[0] * Math.PI / 180;
            const lat2 = pointB[0] * Math.PI / 180;
            const deltaLat = (pointB[0] - pointA[0]) * Math.PI / 180;
            const deltaLon = (pointB[1] - pointA[1]) * Math.PI / 180;
            const haversine =
                Math.sin(deltaLat / 2) ** 2 +
                Math.cos(lat1) * Math.cos(lat2) * Math.sin(deltaLon / 2) ** 2;

            return earthRadiusMeters * 2 * Math.atan2(Math.sqrt(haversine), Math.sqrt(1 - haversine));
        }

        function getPolygonAreaSqMeters(points) {
            if (points.length < 3) return 0;

            const earthRadiusMeters = 6378137;
            let area = 0;

            points.forEach((point, index) => {
                const nextPoint = points[(index + 1) % points.length];
                const lon1 = point[1] * Math.PI / 180;
                const lon2 = nextPoint[1] * Math.PI / 180;
                const lat1 = point[0] * Math.PI / 180;
                const lat2 = nextPoint[0] * Math.PI / 180;

                area += (lon2 - lon1) * (2 + Math.sin(lat1) + Math.sin(lat2));
            });

            return Math.abs(area * earthRadiusMeters * earthRadiusMeters / 2);
        }

        function getPolygonPerimeterMeters(points) {
            if (points.length < 3) return 0;

            return points.reduce((total, point, index) => {
                const nextPoint = points[(index + 1) % points.length];
                return total + getDistanceMeters(point, nextPoint);
            }, 0);
        }

        function updatePolygonInfo() {
            const polygonInfo = document.getElementById('polygon-info');
            const areaValue = document.getElementById('polygon-area-value');
            const perimeterValue = document.getElementById('polygon-perimeter-value');
            const pointsValue = document.getElementById('polygon-points-value');

            if (polygonPoints.length === 0) {
                polygonInfo.classList.add('hidden');
                areaValue.textContent = '--';
                perimeterValue.textContent = '--';
                pointsValue.textContent = '0';
                return;
            }

            polygonInfo.classList.remove('hidden');
            pointsValue.textContent = String(polygonPoints.length);

            if (polygonPoints.length < 3) {
                areaValue.textContent = '--';
                perimeterValue.textContent = '--';
                return;
            }

            areaValue.textContent = formatArea(getPolygonAreaSqMeters(polygonPoints));
            perimeterValue.textContent = formatDistance(getPolygonPerimeterMeters(polygonPoints));
        }

        function setPickLocationMode(isActive) {
            isPickingLocation = isActive;
            const pickButton = document.getElementById('pick-location-button');

            if (isPickingLocation && isDrawingPolygon) {
                cancelPolygonDrawing(false);
            }

            pickButton.classList.toggle('active', isPickingLocation);
            pickButton.setAttribute('aria-label', isPickingLocation ? 'Click map to pick location' : 'Pick location from map');
            pickButton.title = isPickingLocation ? 'Click map to pick location' : 'Pick location from map';
            map.getContainer().style.cursor = isPickingLocation ? 'crosshair' : '';
            setStatus(isPickingLocation ? 'Click the map to set the Last Seen Point.' : 'Ready');
        }

        function togglePickLocationMode() {
            setPickLocationMode(!isPickingLocation);
        }

        function clearPolygonSelection() {
            if (selectedPolygon) {
                map.removeLayer(selectedPolygon);
                selectedPolygon = null;
            }

            if (polygonDraftLine) {
                map.removeLayer(polygonDraftLine);
                polygonDraftLine = null;
            }

            polygonVertexMarkers.forEach(marker => map.removeLayer(marker));
            polygonVertexMarkers = [];
            polygonPoints = [];
            updatePolygonInfo();
        }

        function setPolygonButtonState(isActive) {
            const polygonButton = document.getElementById('pick-polygon-button');

            polygonButton.classList.toggle('active', isActive);
            polygonButton.setAttribute('aria-label', isActive ? 'Finish area selection' : 'Draw area on map');
            polygonButton.title = isActive ? 'Finish area selection' : 'Draw area on map';
        }

        function startPolygonDrawing() {
            if (isPickingLocation) {
                setPickLocationMode(false);
            }

            clearPolygonSelection();
            clearAreaResultLayers();
            isDrawingPolygon = true;
            setPolygonButtonState(true);
            map.getContainer().style.cursor = 'crosshair';
            setStatus('Click the map to add polygon points. Press the polygon button again to finish.');
        }

        function cancelPolygonDrawing(updateStatus = true) {
            isDrawingPolygon = false;
            setPolygonButtonState(false);
            map.getContainer().style.cursor = '';

            if (polygonPoints.length < 3) {
                clearPolygonSelection();
            }

            if (updateStatus) {
                setStatus('Ready');
            }
        }

        function addPolygonPoint(lat, lon) {
            const point = [lat, lon];
            polygonPoints.push(point);
            updatePolygonInfo();

            const vertexMarker = L.circleMarker(point, {
                radius: 5,
                color: '#00ffcc',
                weight: 2,
                fillColor: '#121212',
                fillOpacity: 1
            }).addTo(map);
            polygonVertexMarkers.push(vertexMarker);

            if (polygonPoints.length < 3) {
                if (polygonDraftLine) {
                    polygonDraftLine.setLatLngs(polygonPoints);
                } else {
                    polygonDraftLine = L.polyline(polygonPoints, {
                        color: '#00ffcc',
                        weight: 3,
                        dashArray: '4, 6'
                    }).addTo(map);
                }
                setStatus(`${polygonPoints.length} polygon point${polygonPoints.length === 1 ? '' : 's'} selected. Add at least 3.`);
                return;
            }

            if (polygonDraftLine) {
                map.removeLayer(polygonDraftLine);
                polygonDraftLine = null;
            }

            if (selectedPolygon) {
                selectedPolygon.setLatLngs([polygonPoints]);
            } else {
                selectedPolygon = L.polygon(polygonPoints, {
                    color: '#00ffcc',
                    weight: 3,
                    fillColor: '#00ffcc',
                    fillOpacity: 0.18
                }).addTo(map);
            }

            setStatus(`${polygonPoints.length} polygon points selected. Area ${formatArea(getPolygonAreaSqMeters(polygonPoints))}. Press the polygon button again to finish.`);
        }

        function finishPolygonSelection() {
            if (!selectedPolygon || polygonPoints.length < 3) {
                setStatus('Add at least 3 polygon points before finishing.', true);
                return;
            }

            const center = selectedPolygon.getBounds().getCenter();
            document.getElementById('lat').value = center.lat.toFixed(4);
            document.getElementById('lon').value = center.lng.toFixed(4);

            polygonVertexMarkers.forEach(marker => map.removeLayer(marker));
            polygonVertexMarkers = [];
            isDrawingPolygon = false;
            setPolygonButtonState(false);
            map.getContainer().style.cursor = '';
            setLastSeenMarker(center.lat, center.lng, 'Selected Area Center');
            updatePolygonInfo();
            setStatus(`Polygon selected: ${formatArea(getPolygonAreaSqMeters(polygonPoints))}. Recalculate when ready.`);
        }

        function getSelectedPolygonPayload() {
            if (!selectedPolygon || polygonPoints.length < 3) {
                return null;
            }

            return polygonPoints.map(point => ({
                lat: Number(point[0].toFixed(5)),
                lon: Number(point[1].toFixed(5))
            }));
        }

        function togglePolygonMode() {
            if (isDrawingPolygon) {
                finishPolygonSelection();
                return;
            }

            startPolygonDrawing();
        }

        function getElementCenter(element) {
            if (element.type === 'node') {
                return [element.lat, element.lon];
            }

            if (element.center) {
                return [element.center.lat, element.center.lon];
            }

            if (element.bounds) {
                return [
                    (element.bounds.minlat + element.bounds.maxlat) / 2,
                    (element.bounds.minlon + element.bounds.maxlon) / 2
                ];
            }

            return null;
        }

        function escapeHtml(value) {
            return value
                .replaceAll('&', '&amp;')
                .replaceAll('<', '&lt;')
                .replaceAll('>', '&gt;')
                .replaceAll('"', '&quot;')
                .replaceAll("'", '&#039;');
        }

        function isRealBeachName(name) {
            const cleanName = name && name.trim();

            if (!cleanName) return false;
            if (cleanName.startsWith('#')) return false;
            if (/^#?[A-Za-z]{1,3}\d+[A-Za-z]?$/.test(cleanName)) return false;

            return true;
        }

        function getBeachName(tags) {
            if (!tags) return null;

            return [
                tags['name:he'],
                tags['name:en'],
                tags.name,
                tags['official_name:he'],
                tags.official_name,
                tags['alt_name:he'],
                tags.alt_name
            ].find(isRealBeachName) || null;
        }

        function getBeachKey(name) {
            const normalizedName = name
                .toLowerCase()
                .replaceAll('beach', '')
                .replaceAll('חוף', '')
                .replace(/[\s'"׳״\-–_.,()/]+/g, '');

            return beachNameAliases.get(normalizedName) || normalizedName;
        }

        function addBeachLabel(name, center) {
            L.marker(center, {
                icon: L.divIcon({
                    className: '',
                    html: `<div class="beach-label">${escapeHtml(name)}</div>`,
                    iconSize: [0, 0]
                }),
                interactive: false
            }).addTo(beachLabelLayer);
        }

        function addCuratedBeachLabels(bounds, seenNames) {
            curatedBeachLabels.forEach(beach => {
                if (seenNames.has(beach.key)) return;
                if (!bounds.contains([beach.lat, beach.lon])) return;

                seenNames.add(beach.key);
                addBeachLabel(beach.name, [beach.lat, beach.lon]);
            });
        }

        function updateBeachLabels() {
            if (!map.hasLayer(beachLabelLayer)) return;

            if (map.getZoom() < 13) {
                if (beachLabelAbortController) {
                    beachLabelAbortController.abort();
                }
                beachLabelLayer.clearLayers();
                lastBeachLabelBounds = null;
                return;
            }

            const bounds = map.getBounds().pad(0.15);

            if (lastBeachLabelBounds && lastBeachLabelBounds.contains(bounds)) return;

            lastBeachLabelBounds = bounds;

            if (beachLabelAbortController) {
                beachLabelAbortController.abort();
            }

            const initialSeenNames = new Set();
            beachLabelLayer.clearLayers();
            addCuratedBeachLabels(bounds, initialSeenNames);

            beachLabelAbortController = new AbortController();
            const bbox = [
                bounds.getSouth(),
                bounds.getWest(),
                bounds.getNorth(),
                bounds.getEast()
            ].join(',');
            const query = `
                [out:json][timeout:12];
                (
                  node["natural"="beach"](${bbox});
                  way["natural"="beach"](${bbox});
                  relation["natural"="beach"](${bbox});
                  node["leisure"="beach_resort"](${bbox});
                  way["leisure"="beach_resort"](${bbox});
                  relation["leisure"="beach_resort"](${bbox});
                );
                out center;
            `;

            fetch(`https://overpass-api.de/api/interpreter?data=${encodeURIComponent(query)}`, {
                signal: beachLabelAbortController.signal
            })
                .then(response => response.ok ? response.json() : Promise.reject(new Error('Beach labels unavailable.')))
                .then(data => {
                    if (!map.hasLayer(beachLabelLayer) || map.getZoom() < 13) return;

                    const seenNames = new Set();
                    beachLabelLayer.clearLayers();

                    data.elements.forEach(element => {
                        const name = getBeachName(element.tags);
                        const center = getElementCenter(element);
                        const beachKey = name && getBeachKey(name);

                        if (!name || !center || seenNames.has(beachKey)) return;

                        seenNames.add(beachKey);
                        addBeachLabel(name, center);
                    });

                    addCuratedBeachLabels(bounds, seenNames);
                })
                .catch(error => {
                    if (error.name === 'AbortError') return;
                    if (!map.hasLayer(beachLabelLayer) || map.getZoom() < 13) return;

                    console.warn(error.message);
                    const seenNames = new Set();
                    beachLabelLayer.clearLayers();
                    addCuratedBeachLabels(bounds, seenNames);
                });
        }

        map.on('moveend zoomend', updateBeachLabels);
        map.on('overlayadd', function(event) {
            if (event.layer === beachLabelLayer) {
                updateBeachLabels();
            }
        });
        map.on('overlayremove', function(event) {
            if (event.layer === beachLabelLayer) {
                if (beachLabelAbortController) {
                    beachLabelAbortController.abort();
                }
                beachLabelLayer.clearLayers();
                lastBeachLabelBounds = null;
            }
        });

        function updateDrowningInputVisibility() {
            const mode = document.getElementById('drowning-mode').value;
            document.querySelectorAll('.drowning-input').forEach(group => group.classList.add('hidden'));
            document.getElementById(`${mode}-input-group`).classList.remove('hidden');

            updateDrowningTimeLimits();
        }

        function updateDrowningTimeLimits() {
            const nowParts = toLocalDateTimeParts(new Date());
            const earliestParts = toLocalDateTimeParts(new Date(Date.now() - MAX_SIMULATION_HOURS * 3600000));
            const calendarInput = document.getElementById('drowning-calendar');
            const timeInput = document.getElementById('drowning-time');
            const day = Number(document.getElementById('drowning-day').value);
            const month = Number(document.getElementById('drowning-month').value);
            const yearValue = document.getElementById('drowning-year').value.trim();
            const year = Number(yearValue);

            calendarInput.min = toDateInputValue(earliestParts);
            calendarInput.max = toDateInputValue(nowParts);

            if (yearValue.length !== 4 || !Number.isInteger(year)) {
                timeInput.removeAttribute('max');
                timeInput.removeAttribute('min');
                return;
            }

            if (day === nowParts.day && month === nowParts.month && year === nowParts.year) {
                timeInput.max = nowParts.time;
            } else {
                timeInput.removeAttribute('max');
            }

            if (day === earliestParts.day && month === earliestParts.month && year === earliestParts.year) {
                timeInput.min = earliestParts.time;
            } else {
                timeInput.removeAttribute('min');
            }
        }

        function syncCalendarFromManualDate() {
            const day = Number(document.getElementById('drowning-day').value);
            const month = Number(document.getElementById('drowning-month').value);
            const yearValue = document.getElementById('drowning-year').value.trim();
            const year = Number(yearValue);
            const calendarInput = document.getElementById('drowning-calendar');

            if (!Number.isInteger(day) || !Number.isInteger(month) || yearValue.length !== 4 || !Number.isInteger(year)) {
                return;
            }

            const manualDate = new Date(year, month - 1, day);

            if (
                Number.isNaN(manualDate.getTime())
                || manualDate.getFullYear() !== year
                || manualDate.getMonth() !== month - 1
                || manualDate.getDate() !== day
            ) {
                calendarInput.value = '';
                return;
            }

            calendarInput.value = toDateInputValue({year, month, day});
        }

        function handleManualDateInput() {
            syncCalendarFromManualDate();
            updateDrowningTimeLimits();
        }

        function setManualDateFromCalendar() {
            const calendarValue = document.getElementById('drowning-calendar').value;

            if (!calendarValue) {
                updateDrowningTimeLimits();
                return;
            }

            const [year, month, day] = calendarValue.split('-').map(Number);
            document.getElementById('drowning-day').value = day;
            document.getElementById('drowning-month').value = month;
            document.getElementById('drowning-year').value = year;
            updateDrowningTimeLimits();
        }

        function buildDateFromManualInputs() {
            const day = Number(document.getElementById('drowning-day').value);
            const month = Number(document.getElementById('drowning-month').value);
            const yearValue = document.getElementById('drowning-year').value.trim();
            const year = Number(yearValue);
            const timeValue = document.getElementById('drowning-time').value;
            const [hour, minute] = timeValue.split(':').map(Number);

            if (!Number.isInteger(day) || !Number.isInteger(month) || yearValue.length !== 4 || !Number.isInteger(year) || !timeValue) {
                throw new Error('Enter a valid day, month, year, and time.');
            }

            const drowningDate = new Date(year, month - 1, day, hour, minute);

            if (
                Number.isNaN(drowningDate.getTime())
                || drowningDate.getFullYear() !== year
                || drowningDate.getMonth() !== month - 1
                || drowningDate.getDate() !== day
                || drowningDate.getHours() !== hour
                || drowningDate.getMinutes() !== minute
            ) {
                throw new Error('Enter a valid day, month, year, and time.');
            }

            return drowningDate;
        }

        function buildSimulationParams(lat, lon) {
            const mode = document.getElementById('drowning-mode').value;
            const params = new URLSearchParams({lat, lon});
            const polygonPayload = getSelectedPolygonPayload();
            let elapsedHours = 0;

            if (polygonPayload) {
                params.set('polygon', JSON.stringify(polygonPayload));
            }

            if (mode === 'elapsed') {
                const days = Number(document.getElementById('days').value);
                const hours = Number(document.getElementById('hours').value);
                const minutes = Number(document.getElementById('minutes').value);
                elapsedHours = days * 24 + hours + minutes / 60;
                params.set('days', days);
                params.set('hours', hours);
                params.set('minutes', minutes);
            } else {
                const drowningDate = buildDateFromManualInputs();

                elapsedHours = (Date.now() - drowningDate.getTime()) / 3600000;
                params.set('drowning_time', drowningDate.toISOString());
            }

            if (!Number.isFinite(elapsedHours) || elapsedHours <= 0) {
                throw new Error('The drowning time must be in the past.');
            }

            if (elapsedHours > MAX_SIMULATION_HOURS) {
                throw new Error(`Use a value up to ${MAX_SIMULATION_DAYS} days.`);
            }

            return {params, elapsedHours};
        }

        // Pick mode lets regular map clicks pan/inspect without changing the selected location.
        map.on('click', function(e) {
            const clickedLat = e.latlng.lat;
            const clickedLng = e.latlng.lng;

            if (isDrawingPolygon) {
                addPolygonPoint(clickedLat, clickedLng);
                return;
            }

            if (!isPickingLocation) return;
            
            // Update the UI inputs so the user sees the exact coordinates
            document.getElementById('lat').value = clickedLat.toFixed(4);
            document.getElementById('lon').value = clickedLng.toFixed(4);
            
            // Draw or move the visual Red Pin on the map instantly
            clearPolygonSelection();
            clearAreaResultLayers();
            setLastSeenMarker(clickedLat, clickedLng);
            setPickLocationMode(false);
        });

        async function triggerSimulation() {
            let elapsedHours = 0;

            try {
                if (isDrawingPolygon) {
                    if (!selectedPolygon || polygonPoints.length < 3) {
                        throw new Error('Finish the polygon first, or add at least 3 points.');
                    }

                    finishPolygonSelection();
                }

                const {lat, lon} = getSelectedPosition();
                const simulationInput = buildSimulationParams(lat, lon);
                elapsedHours = simulationInput.elapsedHours;

                if (isPickingLocation) {
                    setPickLocationMode(false);
                }

                // Clear previous paths and heatmaps, keep the startMarker we just dropped
                if (pathLine) {
                    map.removeLayer(pathLine);
                    pathLine = null;
                }

                if (heatLayer) {
                    map.removeLayer(heatLayer);
                    heatLayer = null;
                }

                clearAreaResultLayers();

                setLastSeenMarker(lat, lon);
                setLoading(true);
                setStatus('Calculating drift...');

                const response = await fetch(`${API_BASE_URL}/simulate?${simulationInput.params.toString()}`);
                const result = await response.json();

                if (!response.ok) {
                    throw new Error(result.detail || 'Simulation failed.');
                }

                if (result.status === "success" && result.trajectory.length > 1) {
                    const trajectory = result.trajectory;
                    const latLngs = trajectory.map(p => [p.lat, p.lon]);
                    let finalAreaPoints = [];

                    // Draw the turquoise dashed path showing history
                    pathLine = L.polyline(latLngs, {color: '#00ffcc', weight: 4, dashArray: '6, 8'}).addTo(map);

                    if (Array.isArray(result.area_trajectories) && result.area_trajectories.length > 0) {
                        areaPathLayer = L.layerGroup().addTo(map);

                        result.area_trajectories.forEach(area => {
                            const areaLatLngs = area.trajectory.map(p => [p.lat, p.lon]);

                            if (areaLatLngs.length > 1) {
                                L.polyline(areaLatLngs, {
                                    color: '#ffbf47',
                                    weight: 2,
                                    opacity: 0.75,
                                    dashArray: '3, 6'
                                }).addTo(areaPathLayer);
                            }

                            if (areaLatLngs.length > 0) {
                                finalAreaPoints.push(areaLatLngs[areaLatLngs.length - 1]);
                            }
                        });

                        if (finalAreaPoints.length >= 3) {
                            finalAreaPolygon = L.polygon(finalAreaPoints, {
                                color: '#ffbf47',
                                weight: 3,
                                fillColor: '#ffbf47',
                                fillOpacity: 0.2
                            }).addTo(map).bindPopup('<b>Predicted Area</b><br>Polygon drift projection.');
                        }
                    }

                    // Build expanding uncertainty Heatmap around the final zone
                    let heatPoints = [];
                    trajectory.forEach((point, index) => {
                        let intensity = index === trajectory.length - 1 ? 1.0 : 0.3;
                        heatPoints.push([point.lat, point.lon, intensity]);
                        
                        // If it's the last predicted point, spread the statistical search area
                        if (index === trajectory.length - 1) {
                            for (let i = 0; i < 40; i++) {
                                let dispersion = 0.0025 * elapsedHours;
                                let randomLat = point.lat + (Math.random() - 0.5) * dispersion;
                                let randomLon = point.lon + (Math.random() - 0.5) * dispersion;
                                heatPoints.push([randomLat, randomLon, 0.65]);
                            }
                        }
                    });
                    finalAreaPoints.forEach(point => heatPoints.push([point[0], point[1], 0.8]));

                    heatLayer = L.heatLayer(heatPoints, {
                        radius: 28, 
                        blur: 14, 
                        maxZoom: 12,
                        gradient: {0.3: 'blue', 0.6: 'lime', 1: 'red'}
                    }).addTo(map);

                    // Smoothly slide map view to the target search zone
                    if (finalAreaPoints.length >= 3) {
                        map.fitBounds(L.latLngBounds(latLngs.concat(finalAreaPoints)).pad(0.18));
                        setStatus(`Calculated ${result.hours_simulated} hours from ${result.data_source_used} for selected area.`);
                    } else {
                        map.panTo([trajectory[trajectory.length - 1].lat, trajectory[trajectory.length - 1].lon]);
                        setStatus(`Calculated ${result.hours_simulated} hours from ${result.data_source_used}.`);
                    }
                }
            } catch (error) {
                console.error("API Connection Error:", error);
                setStatus(error.message, true);
            } finally {
                setLoading(false);
            }
        }

        const defaultDrowningDate = toLocalDateTimeParts(new Date());
        document.getElementById('drowning-day').value = defaultDrowningDate.day;
        document.getElementById('drowning-month').value = defaultDrowningDate.month;
        document.getElementById('drowning-year').value = defaultDrowningDate.year;
        document.getElementById('drowning-calendar').value = toDateInputValue(defaultDrowningDate);
        document.getElementById('drowning-time').value = defaultDrowningDate.time;
        updateDrowningInputVisibility();
    </script>
</body>
</html>
