<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafeCurrent - Operational SAR Map</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.heat/dist/leaflet-heat.js"></script>

    <style>
        body { margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; height: 100vh; background: #121212; color: white; }
        #sidebar { width: 320px; padding: 25px; background: #1e1e1e; display: flex; flex-direction: column; gap: 18px; box-shadow: 4px 0 15px rgba(0,0,0,0.6); z-index: 1000; box-sizing: border-box; overflow-y: auto; }
        #map { flex-grow: 1; height: 100%; position: relative; }
        h2 { margin: 0; color: #00ffcc; font-size: 24px; letter-spacing: 1px; }
        p { margin: 0; font-size: 14px; color: #ccc; line-height: 1.4; }
        .input-group { display: flex; flex-direction: column; gap: 6px; }
        label { font-size: 12px; color: #00ffcc; font-weight: bold; text-transform: uppercase; }
        input, select { width: 100%; box-sizing: border-box; padding: 12px; background: #2a2a2a; color: white; border: 1px solid #3d3d3d; border-radius: 6px; font-size: 14px; }
        input:focus, select:focus { border-color: #00ffcc; outline: none; }
        input[readonly] { color: #d8d8d8; background: #252525; }
        button { padding: 14px; border-radius: 6px; border: none; font-size: 15px; font-weight: bold; background: #00ffcc; color: #121212; cursor: pointer; transition: all 0.2s ease-in-out; }
        button:hover { background: #00ddbb; transform: translateY(-1px); }
        button:disabled { cursor: wait; opacity: 0.7; transform: none; }
        .leaflet-top.leaflet-left {
            display: flex;
            align-items: flex-start;
            gap: 8px;
        }
        .share-link-button {
            width: 34px;
            height: 34px;
            padding: 0;
            flex: 0 0 34px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            background: #12b8aa;
            color: #ffffff;
            border: 0;
            box-shadow: 0 4px 14px rgba(18, 184, 170, 0.28);
        }
        .share-link-button:hover { background: #0fa99d; }
        .share-link-button:disabled {
            cursor: not-allowed;
            opacity: 0.45;
            background: #2a5a56;
            color: #d8fff8;
        }
        body.shared-snapshot-mode .share-link-button:disabled {
            cursor: not-allowed;
        }
        .share-link-icon {
            width: 21px;
            height: 21px;
            display: block;
        }
        .share-link-icon line {
            stroke: currentColor;
            stroke-width: 6;
            stroke-linecap: round;
        }
        .share-link-icon circle {
            fill: currentColor;
        }
        .pick-location-button {
            width: 52px;
            height: 52px;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #2a2a2a;
            border: 1px solid #ff4b45;
        }
        .pick-location-button:hover { background: #352323; }
        .pick-location-button.active {
            background: rgba(255, 75, 69, 0.18);
            border-color: #ff4b45;
            box-shadow: 0 0 0 2px rgba(255, 75, 69, 0.25);
        }
        .map-tool-row { display: flex; align-items: stretch; gap: 10px; }
        .map-pin-icon {
            width: 24px;
            height: 24px;
            position: relative;
            background: #ef2f2f;
            border-radius: 50% 50% 50% 0;
            transform: rotate(-45deg);
            box-shadow: 2px 2px 5px rgba(0, 0, 0, 0.35);
        }
        .map-pin-icon::after {
            content: "";
            width: 10px;
            height: 10px;
            position: absolute;
            top: 7px;
            left: 7px;
            border-radius: 50%;
            background: #fff;
        }
        .polygon-icon {
            width: 26px;
            height: 24px;
            display: block;
            background: rgba(0, 255, 204, 0.22);
            border: 3px solid #00ffcc;
            clip-path: polygon(50% 0, 100% 38%, 82% 100%, 18% 100%, 0 38%);
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.35);
        }
        #pick-polygon-button {
            border-color: #00ffcc;
        }
        #pick-polygon-button:hover { background: #1d3732; }
        #pick-polygon-button.active {
            background: rgba(0, 255, 204, 0.16);
            box-shadow: 0 0 0 2px rgba(0, 255, 204, 0.22);
        }
        .polygon-info {
            display: grid;
            flex: 1;
            min-width: 0;
            gap: 6px;
            padding: 10px 12px;
            border: 1px solid rgba(0, 255, 204, 0.28);
            border-radius: 6px;
            background: rgba(0, 255, 204, 0.07);
        }
        .polygon-info-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            font-size: 12px;
            color: #cfcfcf;
        }
        .polygon-info-row strong {
            color: #ffffff;
            font-size: 13px;
            text-align: right;
            white-space: nowrap;
        }
        .polygon-edit-handle,
        .polygon-edge-handle {
            display: block;
            box-sizing: border-box;
            border: 2px solid #121212;
            box-shadow: 0 2px 7px rgba(0, 0, 0, 0.45);
        }
        .polygon-edit-handle {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #00ffcc;
            cursor: grab;
        }
        .polygon-edge-handle {
            width: 14px;
            height: 14px;
            background: #ffbf47;
            transform: rotate(45deg);
            cursor: copy;
        }
        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border: 0;
        }
        .hidden { display: none !important; }
        .time-row { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px; }
        .elapsed-row { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 8px; }
        .date-row { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 8px; }
        .time-field { display: flex; flex-direction: column; gap: 6px; min-width: 0; }
        #time-input-group { gap: 10px; }
        .uncertainty-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
        }
        .uncertainty-toggle {
            width: 42px;
            height: 42px;
            flex: 0 0 42px;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #2a2a2a;
            color: #ffffff;
            border: 1px solid #3d3d3d;
            font-size: 14px;
            text-align: center;
        }
        .uncertainty-toggle:hover { background: #333333; }
        .uncertainty-toggle.active {
            color: #121212;
            background: #ffbf47;
            border-color: #ffbf47;
        }
        .beach-label {
            color: #ffffff;
            font-size: 12px;
            font-weight: 700;
            line-height: 1.2;
            white-space: nowrap;
            padding: 3px 7px;
            border-radius: 4px;
            background: rgba(0, 0, 0, 0.55);
            border: 1px solid rgba(0, 255, 204, 0.45);
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.9);
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.35);
            transform: translate(-50%, -50%);
        }
        .grid-size-control {
            padding: 8px 10px;
            border: 1px solid rgba(0, 255, 204, 0.45);
            border-radius: 6px;
            background: rgba(18, 18, 18, 0.82);
            color: #dffdf8;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.35);
            font-size: 12px;
            line-height: 1.25;
        }
        .grid-size-control span {
            display: block;
            color: #00ffcc;
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
        }
        .grid-size-control strong {
            display: block;
            margin-top: 2px;
            color: #ffffff;
            font-size: 13px;
            white-space: nowrap;
        }
        .grid-size-control small {
            display: block;
            margin-top: 2px;
            color: #b9c8c5;
            font-size: 10px;
        }
        .loading-indicator {
            display: flex;
            align-items: center;
            gap: 10px;
            min-height: 44px;
            padding: 10px 12px;
            border: 1px solid rgba(0, 255, 204, 0.35);
            border-radius: 6px;
            background: rgba(0, 255, 204, 0.08);
            color: #d8fff8;
            font-size: 13px;
            font-weight: 600;
        }
        .loading-indicator.hidden { display: none; }
        .map-loading-overlay {
            position: absolute;
            inset: 0;
            z-index: 1200;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
            background: rgba(0, 0, 0, 0.08);
        }
        .map-loading-card {
            width: min(320px, 70%);
            padding: 18px;
            border: 1px solid rgba(0, 255, 204, 0.45);
            border-radius: 6px;
            background: rgba(18, 18, 18, 0.9);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.45);
        }
        .map-loading-card span {
            display: block;
            margin-bottom: 10px;
            color: #d8fff8;
            font-size: 13px;
            font-weight: 700;
            text-align: center;
        }
        .wave-loader {
            position: relative;
            height: 58px;
            overflow: hidden;
            border: 1px solid rgba(76, 218, 201, 0.35);
            border-radius: 6px;
            background: #0b4f5a;
        }
        .wave-layer {
            position: absolute;
            left: -18%;
            width: 136%;
            height: 100%;
            bottom: 0;
            animation: wave-drift 4.8s ease-in-out infinite alternate;
        }
        .wave-layer svg {
            width: 100%;
            height: 100%;
            display: block;
        }
        .wave-back {
            opacity: 0.95;
            animation-duration: 6.2s;
        }
        .wave-middle {
            opacity: 0.9;
            animation-duration: 7.1s;
            animation-direction: reverse;
        }
        .wave-front {
            opacity: 0.95;
            animation-duration: 4.3s;
        }
        .map-loading-percent {
            position: absolute;
            inset: 0;
            z-index: 3;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ffffff;
            font-size: 24px;
            font-weight: 800;
            text-shadow: 0 1px 5px rgba(0, 0, 0, 0.75);
        }
        @keyframes wave-drift {
            from { transform: translateX(-18px); }
            to { transform: translateX(18px); }
        }
        .loading-spinner {
            width: 24px;
            height: 24px;
            border: 3px solid rgba(255, 255, 255, 0.25);
            border-top-color: #00ffcc;
            border-radius: 50%;
            animation: loading-spin 0.8s linear infinite;
            flex: 0 0 auto;
        }
        @keyframes loading-spin {
            to { transform: rotate(360deg); }
        }
        #status-message { min-height: 18px; font-size: 12px; color: #aaa; }
        #status-message.error { color: #ff7676; }
        .footer { margin-top: auto; font-size: 11px; color: #666; border-top: 1px solid #333; padding-top: 15px; }
    </style>
</head>
<body>

    <div id="sidebar">
        <h2>SafeCurrent UI</h2>
        <div id="status-message" role="status">Ready</div>
        
        <div class="map-tool-row">
            <button id="pick-location-button" class="pick-location-button" onclick="togglePickLocationMode()" type="button" aria-label="Pick location from map" title="Pick location from map">
                <span class="map-pin-icon" aria-hidden="true"></span>
                <span class="sr-only">Pick location from map</span>
            </button>
            <button id="pick-polygon-button" class="pick-location-button" onclick="togglePolygonMode()" type="button" aria-label="Draw area on map" title="Draw area on map">
                <span class="polygon-icon" aria-hidden="true"></span>
                <span class="sr-only">Draw area on map</span>
            </button>
            <div id="polygon-info" class="polygon-info hidden" aria-live="polite">
                <div class="polygon-info-row">
                    <span>Area</span>
                    <strong id="polygon-area-value">--</strong>
                </div>
                <div class="polygon-info-row">
                    <span>Perimeter</span>
                    <strong id="polygon-perimeter-value">--</strong>
                </div>
                <div class="polygon-info-row">
                    <span>Points</span>
                    <strong id="polygon-points-value">0</strong>
                </div>
            </div>
        </div>
        <div class="input-group">
            <div class="time-row">
                <div class="time-field">
                    <label for="lat">Latitude</label>
                    <input type="number" id="lat" value="32.0800" min="-90" max="90" step="0.0001">
                </div>
                <div class="time-field">
                    <label for="lon">Longitude</label>
                    <input type="number" id="lon" value="34.7650" min="-180" max="180" step="0.0001">
                </div>
            </div>
        </div>
        <div class="input-group">
            <div class="time-row">
                <div class="time-field">
                    <label for="build">Build</label>
                    <select id="build">
                        <option value="lean">Lean</option>
                        <option value="average" selected>Average</option>
                        <option value="fat">Fat</option>
                    </select>
                </div>
                <div class="time-field">
                    <label for="age">Age</label>
                    <input type="number" id="age" value="30" min="0" max="120" step="1">
                </div>
            </div>
        </div>
        <div class="input-group">
            <label for="drowning-mode">Drowning Time Input</label>
            <select id="drowning-mode" onchange="updateDrowningInputVisibility()">
                <option value="elapsed">Time Since Drowning</option>
                <option value="time">Time of Drowning</option>
            </select>
        </div>
        <div class="input-group drowning-input" id="elapsed-input-group">
            <div class="elapsed-row">
                <div class="time-field">
                    <label for="days">Days</label>
                    <input type="number" id="days" value="0" min="0" max="7" step="1">
                </div>
                <div class="time-field">
                    <label for="hours">Hours</label>
                    <input type="number" id="hours" value="4" min="0" max="23" step="1">
                </div>
                <div class="time-field">
                    <label for="minutes">Minutes</label>
                    <input type="number" id="minutes" value="0" min="0" max="59" step="1">
                </div>
            </div>
        </div>
        <div class="input-group drowning-input hidden" id="time-input-group">
            <div class="time-field">
                <label for="drowning-calendar">Calendar</label>
                <input type="date" id="drowning-calendar" onchange="setManualDateFromCalendar()">
            </div>
            <div class="date-row">
                <div class="time-field">
                    <label for="drowning-day">Day</label>
                    <input type="number" id="drowning-day" min="1" max="31" step="1" oninput="handleManualDateInput()">
                </div>
                <div class="time-field">
                    <label for="drowning-month">Month</label>
                    <input type="number" id="drowning-month" min="1" max="12" step="1" readonly>
                </div>
                <div class="time-field">
                    <label for="drowning-year">Year</label>
                    <input type="text" id="drowning-year" inputmode="numeric" maxlength="4" readonly>
                </div>
            </div>
            <div class="time-field">
                <label for="drowning-time">Time</label>
                <input type="time" id="drowning-time" step="60">
            </div>
        </div>
        <div class="input-group">
            <div class="uncertainty-header">
                <label for="range-minutes">Time not exact</label>
                <button id="time-uncertainty-toggle" class="uncertainty-toggle" onclick="toggleTimeUncertainty()" type="button" aria-label="Toggle time range" aria-pressed="false" title="Toggle time range">+/-</button>
            </div>
            <div id="time-uncertainty-group" class="time-field hidden">
                <label for="range-minutes">Range Minutes</label>
                <input type="number" id="range-minutes" value="30" min="1" max="10080" step="1">
            </div>
        </div>
        
        <button id="simulate-button" onclick="triggerSimulation()">Recalculate Current Points</button>
        <div id="loading-indicator" class="loading-indicator hidden" role="status" aria-live="polite">
            <div class="loading-spinner" aria-hidden="true"></div>
            <span>Calculating drift...</span>
        </div>

        <div class="footer">
            System Status: Connected<br>
            Live Feed: Open-Meteo / Copernicus Marine Backup
        </div>
    </div>

    <div id="map">
        <div id="map-loading-overlay" class="map-loading-overlay hidden" role="status" aria-live="polite">
            <div class="map-loading-card">
                <span id="map-loading-label">Calculating drift...</span>
                <div class="wave-loader" aria-hidden="true">
                    <div class="wave-layer wave-back">
                        <svg viewBox="0 0 720 120" preserveAspectRatio="none">
                            <path fill="#0a5f6f" d="M0 42 C42 42 42 8 84 8 C126 8 126 42 168 42 C210 42 210 8 252 8 C294 8 294 42 336 42 C378 42 378 8 420 8 C462 8 462 42 504 42 C546 42 546 8 588 8 C630 8 630 42 672 42 C696 42 708 32 720 22 L720 120 L0 120 Z"></path>
                        </svg>
                    </div>
                    <div class="wave-layer wave-middle">
                        <svg viewBox="0 0 720 120" preserveAspectRatio="none">
                            <path fill="#168b8f" d="M0 58 C60 20 102 20 162 58 C222 96 264 96 324 58 C384 20 426 20 486 58 C546 96 588 96 648 58 C684 35 705 32 720 36 L720 120 L0 120 Z"></path>
                        </svg>
                    </div>
                    <div class="wave-layer wave-front">
                        <svg viewBox="0 0 720 120" preserveAspectRatio="none">
                            <path fill="#39b6a6" d="M0 70 C58 38 106 38 164 70 C222 102 270 102 328 70 C386 38 434 38 492 70 C550 102 598 102 656 70 C684 54 704 50 720 54 L720 120 L0 120 Z"></path>
                        </svg>
                    </div>
                    <div id="map-loading-percent" class="map-loading-percent">0%</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Initialize map on Israel Coast
        const map = L.map('map').setView([32.0800, 34.7650], 12);
        
        map.createPane('labels');
        map.getPane('labels').style.zIndex = 650;
        map.getPane('labels').style.pointerEvents = 'none';
        map.createPane('grid');
        map.getPane('grid').style.zIndex = 620;
        map.getPane('grid').style.pointerEvents = 'none';

        const satelliteLayer = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
            attribution: 'Tiles &copy; Esri',
            maxZoom: 20,
            maxNativeZoom: 19
        }).addTo(map);

        const labelLayer = L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager_only_labels/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap contributors &copy; CARTO',
            subdomains: 'abcd',
            maxZoom: 20,
            pane: 'labels'
        }).addTo(map);

        const beachLabelLayer = L.layerGroup().addTo(map);
        const gridLayer = L.layerGroup().addTo(map);
        let beachLabelAbortController = null;
        let lastBeachLabelBounds = null;
        const curatedBeachLabels = [
            {key: 'tzuk', name: 'Tzuk Beach', lat: 32.1288, lon: 34.7898},
            {key: 'tel-baruch', name: 'Tel Baruch Beach', lat: 32.1194, lon: 34.7848},
            {key: 'metsitsim', name: 'Metsitsim Beach', lat: 32.0967, lon: 34.7737},
            {key: 'nordau', name: 'Nordau Beach', lat: 32.0925, lon: 34.7719},
            {key: 'hilton', name: 'Hilton Beach', lat: 32.0887, lon: 34.7699},
            {key: 'gordon', name: 'Gordon Beach', lat: 32.0835, lon: 34.7673},
            {key: 'frishman', name: 'Frishman Beach', lat: 32.0798, lon: 34.7651},
            {key: 'bograshov', name: 'Bograshov Beach', lat: 32.0770, lon: 34.7640},
            {key: 'jerusalem', name: 'Jerusalem Beach', lat: 32.0738, lon: 34.7625},
            {key: 'banana', name: 'Banana Beach', lat: 32.0693, lon: 34.7604},
            {key: 'charles-clore', name: 'Charles Clore Beach', lat: 32.0649, lon: 34.7586},
            {key: 'alma', name: 'Alma Beach', lat: 32.0596, lon: 34.7565},
            {key: 'jaffa', name: 'Jaffa Beach', lat: 32.0540, lon: 34.7539},
            {key: 'givat-aliyah', name: 'Givat Aliyah Beach', lat: 32.0357, lon: 34.7466}
        ];
        const beachNameAliases = new Map([
            ['tzuk', 'tzuk'],
            ['הצוק', 'tzuk'],
            ['telbaruch', 'tel-baruch'],
            ['תלברוך', 'tel-baruch'],
            ['metsitsim', 'metsitsim'],
            ['metzitzim', 'metsitsim'],
            ['מציצים', 'metsitsim'],
            ['nordau', 'nordau'],
            ['נורדאו', 'nordau'],
            ['hilton', 'hilton'],
            ['הילטון', 'hilton'],
            ['gordon', 'gordon'],
            ['גורדון', 'gordon'],
            ['frishman', 'frishman'],
            ['פרישמן', 'frishman'],
            ['bograshov', 'bograshov'],
            ['בוגרשוב', 'bograshov'],
            ['jerusalem', 'jerusalem'],
            ['ירושלים', 'jerusalem'],
            ['banana', 'banana'],
            ['בננה', 'banana'],
            ['charlesclore', 'charles-clore'],
            ['צארלסקלור', 'charles-clore'],
            ['alma', 'alma'],
            ['עלמה', 'alma'],
            ['jaffa', 'jaffa'],
            ['יפו', 'jaffa'],
            ['givataliyah', 'givat-aliyah'],
            ['גבעתעליה', 'givat-aliyah'],
            ['גבעתעלייה', 'givat-aliyah']
        ]);

        L.control.layers(
            {"Satellite": satelliteLayer},
            {
                "City labels": labelLayer,
                "Beach names": beachLabelLayer,
                "Lat/Lon grid": gridLayer
            },
            {collapsed: true}
        ).addTo(map);

        const gridSizeControl = L.control({position: 'bottomright'});
        gridSizeControl.onAdd = function() {
            const container = L.DomUtil.create('div', 'grid-size-control');
            container.innerHTML = `
                <span>Grid square</span>
                <strong id="grid-size-value">--</strong>
                <small id="grid-step-value">--</small>
            `;
            L.DomEvent.disableClickPropagation(container);
            return container;
        };
        gridSizeControl.addTo(map);

        const shareLinkControl = L.control({position: 'topleft'});
        shareLinkControl.onAdd = function() {
            const container = L.DomUtil.create('div', 'share-link-map-control');
            container.innerHTML = `
                <button id="share-link-button" class="share-link-button" onclick="copyShareLink()" type="button" disabled aria-label="Copy share link" title="Copy share link">
                    <svg class="share-link-icon" viewBox="0 0 64 64" aria-hidden="true" focusable="false">
                        <line x1="22" y1="34" x2="45" y2="20"></line>
                        <line x1="22" y1="34" x2="45" y2="46"></line>
                        <circle cx="16" cy="36" r="10"></circle>
                        <circle cx="49" cy="17" r="10"></circle>
                        <circle cx="49" cy="49" r="10"></circle>
                    </svg>
                </button>
            `;
            L.DomEvent.disableClickPropagation(container);
            L.DomEvent.disableScrollPropagation(container);

        shareLinkControl.addTo(map);

        function getGridStep(zoom) {
            if (zoom >= 17) return 0.001;
            if (zoom >= 15) return 0.0025;
            if (zoom >= 13) return 0.005;
            if (zoom >= 11) return 0.01;
            if (zoom >= 9) return 0.05;
            if (zoom >= 7) return 0.1;
            return 0.5;
        }

        function getGridDecimals(step) {
            if (step < 0.002) return 3;
            if (step < 0.01) return 3;
            if (step < 0.1) return 2;
            return 1;
        }

        function updateGridLayer() {
            if (!map.hasLayer(gridLayer)) return;

            gridLayer.clearLayers();

            const bounds = map.getBounds().pad(0.02);
            const south = bounds.getSouth();
            const north = bounds.getNorth();
            const west = bounds.getWest();
            const east = bounds.getEast();
            const step = getGridStep(map.getZoom());
            const firstLat = Math.ceil(south / step) * step;
            const firstLon = Math.ceil(west / step) * step;
            const lineStyle = {
                pane: 'grid',
                color: '#00ffcc',
                weight: 1,
                opacity: 0.34,
                interactive: false
            };

            for (let lat = firstLat; lat <= north + step / 2; lat += step) {
                const normalizedLat = Number(lat.toFixed(6));
                L.polyline([[normalizedLat, west], [normalizedLat, east]], lineStyle).addTo(gridLayer);
            }

            for (let lon = firstLon; lon <= east + step / 2; lon += step) {
                const normalizedLon = Number(lon.toFixed(6));
                L.polyline([[south, normalizedLon], [north, normalizedLon]], lineStyle).addTo(gridLayer);
            }

            updateGridSizeControl();
        }

        function updateGridSizeControl() {
            const sizeValue = document.getElementById('grid-size-value');
            const stepValue = document.getElementById('grid-step-value');

            if (!sizeValue || !stepValue) return;

            if (!map.hasLayer(gridLayer)) {
                sizeValue.textContent = 'Hidden';
                stepValue.textContent = 'Turn on Lat/Lon grid';
                return;
            }

            const center = map.getCenter();
            const step = getGridStep(map.getZoom());
            const decimals = getGridDecimals(step);
            const widthMeters = getDistanceMeters([center.lat, center.lng], [center.lat, center.lng + step]);
            const heightMeters = getDistanceMeters([center.lat, center.lng], [center.lat + step, center.lng]);

            sizeValue.textContent = `${formatDistance(widthMeters)} x ${formatDistance(heightMeters)}`;
            stepValue.textContent = `${step.toFixed(decimals)} deg spacing`;
        }

        let pathLine = null;

        let heatLayer = null;

        let finalAreaPolygon = null;

        let isPickingLocation = false;
        let isDrawingPolygon = false;
        let selectedPolygon = null;
        let polygonDraftLine = null;
        let polygonVertexMarkers = [];
        let polygonEditMarkers = [];
        let polygonEdgeMarkers = [];

        function toLocalDateTimeParts(date) {
            const localDate = new Date(date.getTime() - date.getTimezoneOffset() * 60000);
            const value = localDate.toISOString().slice(0, 16);
            const dateValue = value.slice(0, 10);
            const [year, month, day] = dateValue.split('-').map(Number);

            return {
                date: dateValue,
                time: value.slice(11, 16),
                year,
                month,
                day
            };
        }

        function toDateInputValue(parts) {
            const year = String(parts.year).padStart(4, '0');
            const month = String(parts.month).padStart(2, '0');
            const day = String(parts.day).padStart(2, '0');
            return `${year}-${month}-${day}`;
        }

        function setStatus(message, isError = false) {

            statusMessage.textContent = message;

        function setShareSnapshot(snapshot, shareId = null) {
            currentShareSnapshot = snapshot;

        async function copyTextToClipboard(text) {
            if (navigator.clipboard && window.isSecureContext) {
                await navigator.clipboard.writeText(text);
                return;
            }

            const textArea = document.createElement('textarea');
            textArea.value = text;
            textArea.setAttribute('readonly', '');
            textArea.style.position = 'fixed';
            textArea.style.left = '-9999px';
            document.body.appendChild(textArea);
            textArea.select();
            document.execCommand('copy');
            document.body.removeChild(textArea);
        }

        async function copyShareLink() {
            if (!currentShareSnapshot) {
                setStatus('Calculate first, then copy a share link.', true);
                return;
            }

            try {
                let shareId = activeSharedSnapshotId;

                if (!shareId) {
                    const response = await fetch(`${API_BASE_URL}/share`, {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify(currentShareSnapshot)
                    });
                    const data = await response.json();

                    if (!response.ok) {
                        throw new Error(data.detail || 'Could not create share link.');
                    }

                    shareId = data.share_id;
                    activeSharedSnapshotId = shareId;
                }

                const shareUrl = new URL(`${API_BASE_URL}/`);
                shareUrl.searchParams.set('snapshot', shareId);

                await copyTextToClipboard(shareUrl.toString());
                setStatus('Share link copied. Send it in WhatsApp.');
            } catch (error) {
                setStatus(error.message, true);
            }
        }

        function isTimeUncertaintyEnabled() {

        function setTimeUncertaintyEnabled(isEnabled) {
            const toggle = document.getElementById('time-uncertainty-toggle');

        function getTimeUncertaintyHours() {
            if (!isTimeUncertaintyEnabled()) {
                return 0;
            }

            const rangeMinutes = Number(document.getElementById('range-minutes').value);
            const uncertaintyHours = rangeMinutes / 60;

            if (!Number.isFinite(rangeMinutes) || rangeMinutes <= 0 || rangeMinutes > MAX_SIMULATION_HOURS * 60) {
                throw new Error('Enter a valid time range.');
            }

            if (!Number.isFinite(uncertaintyHours) || uncertaintyHours <= 0) {
                throw new Error('Enter a positive time range.');
            }

            return uncertaintyHours;
        }

        function getSelectedPosition() {
            const lat = Number(document.getElementById('lat').value);
            const lon = Number(document.getElementById('lon').value);

            if (!Number.isFinite(lat) || lat < -90 || lat > 90) {
                throw new Error('Enter a valid latitude between -90 and 90.');
            }

            if (!Number.isFinite(lon) || lon < -180 || lon > 180) {
                throw new Error('Enter a valid longitude between -180 and 180.');
            }

            return {lat, lon};
        }

        function setLastSeenMarker(lat, lon, title = 'Last Seen Point', openPopup = true) {
            if (startMarker) map.removeLayer(startMarker);

            startMarker = L.marker([lat, lon]).addTo(map)
                .bindPopup(`<b>${title}</b><br>Calculating drift vectors...`);

            if (openPopup) {
                startMarker.openPopup();

        }

        function clearAreaResultLayers() {
            if (areaPathLayer) {
                map.removeLayer(areaPathLayer);
                areaPathLayer = null;
            }

            if (finalAreaPolygon) {
                map.removeLayer(finalAreaPolygon);

            }
        }

        function clearTimeRangeLayer() {
            if (timeRangeLayer) {
                map.removeLayer(timeRangeLayer);
                timeRangeLayer = null;
            }
        }

        function clearDriftResultLayers() {
            if (!isSharedSnapshotMode) {
                setShareSnapshot(null);
            }

            if (pathLine) {
                map.removeLayer(pathLine);
                pathLine = null;
            }

            if (heatLayer) {
                map.removeLayer(heatLayer);
                heatLayer = null;
            }

            clearAreaResultLayers();
            clearTimeRangeLayer();

        function formatArea(areaSqMeters) {
            if (areaSqMeters >= 1000000) {
                return `${(areaSqMeters / 1000000).toFixed(2)} km2`;
            }

            return `${Math.round(areaSqMeters).toLocaleString()} m2`;
        }

        function formatDistance(distanceMeters) {
            if (distanceMeters >= 1000) {
                return `${(distanceMeters / 1000).toFixed(2)} km`;
            }

            return `${Math.round(distanceMeters).toLocaleString()} m`;
        }

        function getDistanceMeters(pointA, pointB) {
            const earthRadiusMeters = 6371000;
            const lat1 = pointA[0] * Math.PI / 180;
            const lat2 = pointB[0] * Math.PI / 180;
            const deltaLat = (pointB[0] - pointA[0]) * Math.PI / 180;
            const deltaLon = (pointB[1] - pointA[1]) * Math.PI / 180;
            const haversine =
                Math.sin(deltaLat / 2) ** 2 +
                Math.cos(lat1) * Math.cos(lat2) * Math.sin(deltaLon / 2) ** 2;

            return earthRadiusMeters * 2 * Math.atan2(Math.sqrt(haversine), Math.sqrt(1 - haversine));
        }

        function getPolygonAreaSqMeters(points) {
            if (points.length < 3) return 0;

            const earthRadiusMeters = 6378137;
            let area = 0;

            points.forEach((point, index) => {
                const nextPoint = points[(index + 1) % points.length];
                const lon1 = point[1] * Math.PI / 180;
                const lon2 = nextPoint[1] * Math.PI / 180;
                const lat1 = point[0] * Math.PI / 180;
                const lat2 = nextPoint[0] * Math.PI / 180;

                area += (lon2 - lon1) * (2 + Math.sin(lat1) + Math.sin(lat2));
            });

            return Math.abs(area * earthRadiusMeters * earthRadiusMeters / 2);
        }

        function getPolygonPerimeterMeters(points) {
            if (points.length < 3) return 0;

            return points.reduce((total, point, index) => {
                const nextPoint = points[(index + 1) % points.length];
                return total + getDistanceMeters(point, nextPoint);
            }, 0);
        }

        function updatePolygonInfo() {
            const polygonInfo = document.getElementById('polygon-info');
            const areaValue = document.getElementById('polygon-area-value');
            const perimeterValue = document.getElementById('polygon-perimeter-value');
            const pointsValue = document.getElementById('polygon-points-value');

            if (polygonPoints.length === 0) {
                polygonInfo.classList.add('hidden');
                areaValue.textContent = '--';
                perimeterValue.textContent = '--';
                pointsValue.textContent = '0';
                return;
            }

            polygonInfo.classList.remove('hidden');
            pointsValue.textContent = String(polygonPoints.length);

            if (polygonPoints.length < 3) {
                areaValue.textContent = '--';
                perimeterValue.textContent = '--';
                return;
            }

            areaValue.textContent = formatArea(getPolygonAreaSqMeters(polygonPoints));
            perimeterValue.textContent = formatDistance(getPolygonPerimeterMeters(polygonPoints));
        }

        function createPolygonHandleIcon(type) {
            const className = type === 'edge' ? 'polygon-edge-handle' : 'polygon-edit-handle';
            const size = type === 'edge' ? 14 : 16;

            return L.divIcon({
                className: '',
                html: `<span class="${className}"></span>`,
                iconSize: [size, size],
                iconAnchor: [size / 2, size / 2]
            });
        }

        function clearPolygonEditHandles() {
            polygonEditMarkers.forEach(marker => map.removeLayer(marker));
            polygonEdgeMarkers.forEach(marker => map.removeLayer(marker));
            polygonEditMarkers = [];
            polygonEdgeMarkers = [];
        }

        function getEdgeMidpoint(firstPoint, secondPoint) {
            return [
                (firstPoint[0] + secondPoint[0]) / 2,
                (firstPoint[1] + secondPoint[1]) / 2
            ];
        }

        function syncPolygonEditHandles(skipEdgeIndex = null) {
            polygonEditMarkers.forEach((marker, index) => {
                if (polygonPoints[index]) {
                    marker.setLatLng(polygonPoints[index]);
                }
            });

            polygonEdgeMarkers.forEach((marker, index) => {
                if (index === skipEdgeIndex) return;

                const nextIndex = (index + 1) % polygonPoints.length;
                if (polygonPoints[index] && polygonPoints[nextIndex]) {
                    marker.setLatLng(getEdgeMidpoint(polygonPoints[index], polygonPoints[nextIndex]));
                }
            });
        }

        function updateSelectedPolygonFromPoints(statusMessage = null) {
            if (!selectedPolygon || polygonPoints.length < 3) return;

            selectedPolygon.setLatLngs([polygonPoints]);

            const center = selectedPolygon.getBounds().getCenter();
            document.getElementById('lat').value = center.lat.toFixed(4);
            document.getElementById('lon').value = center.lng.toFixed(4);
            setLastSeenMarker(center.lat, center.lng, 'Selected Area Center', false);
            updatePolygonInfo();
            clearDriftResultLayers();

            if (statusMessage) {
                setStatus(statusMessage);
            }
        }

        function addPolygonVertexOnEdge(edgeIndex, latLng) {
            const insertIndex = edgeIndex + 1;
            polygonPoints.splice(insertIndex, 0, [latLng.lat, latLng.lng]);
            updateSelectedPolygonFromPoints(`Vertex added: ${formatArea(getPolygonAreaSqMeters(polygonPoints))}. Recalculate when ready.`);
            renderPolygonEditHandles();
        }

        function renderPolygonEditHandles() {
            clearPolygonEditHandles();

            if (!selectedPolygon || polygonPoints.length < 3) return;

            polygonPoints.forEach((point, index) => {
                const marker = L.marker(point, {
                    icon: createPolygonHandleIcon('corner'),
                    draggable: true,
                    title: 'Drag corner'
                }).addTo(map);

                marker.on('drag', function(event) {
                    const position = event.target.getLatLng();
                    polygonPoints[index] = [position.lat, position.lng];
                    updateSelectedPolygonFromPoints(`Polygon adjusted: ${formatArea(getPolygonAreaSqMeters(polygonPoints))}. Recalculate when ready.`);
                    syncPolygonEditHandles();
                });

                marker.on('dragend', function() {
                    syncPolygonEditHandles();
                });

                polygonEditMarkers.push(marker);
            });

            polygonPoints.forEach((point, index) => {
                const nextIndex = (index + 1) % polygonPoints.length;
                const marker = L.marker(getEdgeMidpoint(point, polygonPoints[nextIndex]), {
                    icon: createPolygonHandleIcon('edge'),
                    draggable: true,
                    title: 'Drag edge, or click to add vertex'
                }).addTo(map);
                let lastPosition = marker.getLatLng();
                let wasDragged = false;

                marker.on('dragstart', function(event) {
                    lastPosition = event.target.getLatLng();
                    wasDragged = false;
                });

                marker.on('drag', function(event) {
                    wasDragged = true;
                    const position = event.target.getLatLng();
                    const deltaLat = position.lat - lastPosition.lat;
                    const deltaLng = position.lng - lastPosition.lng;
                    polygonPoints[index] = [polygonPoints[index][0] + deltaLat, polygonPoints[index][1] + deltaLng];
                    polygonPoints[nextIndex] = [polygonPoints[nextIndex][0] + deltaLat, polygonPoints[nextIndex][1] + deltaLng];
                    lastPosition = position;

                    updateSelectedPolygonFromPoints(`Polygon edge moved: ${formatArea(getPolygonAreaSqMeters(polygonPoints))}. Recalculate when ready.`);
                    syncPolygonEditHandles(index);
                });

                marker.on('dragend', function() {
                    syncPolygonEditHandles();
                    window.setTimeout(() => {
                        wasDragged = false;
                    }, 150);
                });

                marker.on('click', function(event) {
                    if (wasDragged) return;

                    addPolygonVertexOnEdge(index, event.target.getLatLng());
                });

                polygonEdgeMarkers.push(marker);
            });
        }

        function setPickLocationMode(isActive) {
            isPickingLocation = isActive;
            const pickButton = document.getElementById('pick-location-button');

            if (isPickingLocation && isDrawingPolygon) {
                cancelPolygonDrawing(false);
            }

            pickButton.classList.toggle('active', isPickingLocation);
            pickButton.setAttribute('aria-label', isPickingLocation ? 'Click map to pick location' : 'Pick location from map');
            pickButton.title = isPickingLocation ? 'Click map to pick location' : 'Pick location from map';
            map.getContainer().style.cursor = isPickingLocation ? 'crosshair' : '';
            setStatus(isPickingLocation ? 'Click the map to set the Last Seen Point.' : 'Ready');
        }

        function togglePickLocationMode() {
            setPickLocationMode(!isPickingLocation);
        }

        function clearPolygonSelection() {
            if (selectedPolygon) {
                map.removeLayer(selectedPolygon);
                selectedPolygon = null;
            }

            if (polygonDraftLine) {
                map.removeLayer(polygonDraftLine);
                polygonDraftLine = null;
            }

            polygonVertexMarkers.forEach(marker => map.removeLayer(marker));
            polygonVertexMarkers = [];
            clearPolygonEditHandles();
            polygonPoints = [];
            updatePolygonInfo();
