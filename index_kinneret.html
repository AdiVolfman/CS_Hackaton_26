<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafeCurrent - Kinneret Mode</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.heat/dist/leaflet-heat.js"></script>

    <style>
        body { margin: 0; height: 100vh; display: flex; background: #121212; color: #ffffff; font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif; }
        #sidebar { width: 320px; box-sizing: border-box; padding: 25px; background: #1e1e1e; box-shadow: 4px 0 15px rgba(0, 0, 0, 0.6); z-index: 1000; display: flex; flex-direction: column; gap: 18px; overflow-y: auto; }
        #map { flex: 1; min-width: 0; height: 100%; }
        h2 { margin: 0; color: #00ffcc; font-size: 24px; letter-spacing: 1px; }
        p { margin: 0; color: #cfcfcf; font-size: 14px; line-height: 1.45; }
        label { color: #00ffcc; font-size: 12px; font-weight: 700; text-transform: uppercase; }
        input, select { width: 100%; box-sizing: border-box; padding: 12px; color: #ffffff; background: #2a2a2a; border: 1px solid #3d3d3d; border-radius: 6px; font-size: 14px; }
        input:focus, select:focus { border-color: #00ffcc; outline: none; }
        button { padding: 13px; border: none; border-radius: 6px; color: #121212; background: #00ffcc; font-size: 14px; font-weight: 700; cursor: pointer; transition: background 0.18s ease, transform 0.18s ease; }
        button:hover { background: #00ddbb; transform: translateY(-1px); }
        button:disabled { cursor: wait; opacity: 0.72; transform: none; }
        .secondary-button { color: #ffffff; background: #2a2a2a; border: 1px solid #4a4a4a; }
        .secondary-button:hover { background: #333333; }
        .hidden { display: none !important; }
        .field { display: flex; flex-direction: column; gap: 6px; }
        .row { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px; }
        .actions { display: grid; grid-template-columns: 1fr; gap: 10px; }
        .panel { display: flex; flex-direction: column; gap: 10px; }
        .divider { border-top: 1px solid #333333; padding-top: 10px; }
        .map-tool-row { display: flex; align-items: stretch; gap: 10px; }
        .pick-location-button {
            width: 52px;
            height: 52px;
            flex: 0 0 52px;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #2a2a2a;
            border: 1px solid #ff4b45;
        }
        .pick-location-button:hover { background: #352323; }
        .pick-location-button.active {
            background: rgba(255, 75, 69, 0.18);
            border-color: #ff4b45;
            box-shadow: 0 0 0 2px rgba(255, 75, 69, 0.25);
        }
        #pick-polygon-button { border-color: #00ffcc; }
        #pick-polygon-button:hover { background: #1d3732; }
        #pick-polygon-button.active {
            background: rgba(0, 255, 204, 0.16);
            box-shadow: 0 0 0 2px rgba(0, 255, 204, 0.22);
        }
        .map-pin-icon {
            width: 24px;
            height: 24px;
            position: relative;
            background: #ef2f2f;
            border-radius: 50% 50% 50% 0;
            transform: rotate(-45deg);
            box-shadow: 2px 2px 5px rgba(0, 0, 0, 0.35);
        }
        .map-pin-icon::after {
            content: "";
            width: 10px;
            height: 10px;
            position: absolute;
            top: 7px;
            left: 7px;
            border-radius: 50%;
            background: #fff;
        }
        .polygon-icon {
            width: 26px;
            height: 24px;
            display: block;
            background: rgba(0, 255, 204, 0.22);
            border: 3px solid #00ffcc;
            clip-path: polygon(50% 0, 100% 38%, 82% 100%, 18% 100%, 0 38%);
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.35);
        }
        .polygon-info {
            display: grid;
            flex: 1;
            min-width: 0;
            gap: 6px;
            padding: 10px 12px;
            border: 1px solid rgba(0, 255, 204, 0.28);
            border-radius: 6px;
            background: rgba(0, 255, 204, 0.07);
        }
        .polygon-info-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            font-size: 12px;
            color: #cfcfcf;
        }
        .polygon-info-row strong {
            color: #ffffff;
            font-size: 13px;
            text-align: right;
            white-space: nowrap;
        }
        .elapsed-row { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 8px; }
        .manual-current { display: grid; gap: 10px; }
        .uncertainty-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
        }
        .uncertainty-toggle {
            width: 42px;
            height: 42px;
            flex: 0 0 42px;
            padding: 0;
            background: #2a2a2a;
            color: #ffffff;
            border: 1px solid #3d3d3d;
            font-size: 14px;
        }
        .uncertainty-toggle.active {
            color: #121212;
            background: #ffbf47;
            border-color: #ffbf47;
        }
        .toggle-row { display: flex; align-items: center; gap: 10px; color: #d6d6d6; font-size: 14px; }
        .toggle-row input { width: auto; }
        #status-message { min-height: 40px; color: #bfbfbf; font-size: 14px; line-height: 1.45; }
        #status-message.error { color: #ffd2cf; }
        .count { color: #ffffff; font-weight: 700; }
        .leaflet-popup-content-wrapper, .leaflet-popup-tip { background: #1f1f1f; color: #ffffff; }
    </style>
</head>
<body>
    <aside id="sidebar">
        <div>
            <h2>SafeCurrent UI</h2>
        </div>

        <div id="status-message">Ready.</div>

        <div class="map-tool-row">
            <button id="pick-location-button" class="pick-location-button" type="button" aria-label="Pick point from map" title="Pick point from map">
                <span class="map-pin-icon" aria-hidden="true"></span>
            </button>
            <button id="pick-polygon-button" class="pick-location-button" type="button" aria-label="Draw area on map" title="Draw area on map">
                <span class="polygon-icon" aria-hidden="true"></span>
            </button>
            <div id="polygon-info" class="polygon-info hidden" aria-live="polite">
                <div class="polygon-info-row">
                    <span>Area</span>
                    <strong id="polygon-area-value">--</strong>
                </div>
                <div class="polygon-info-row">
                    <span>Perimeter</span>
                    <strong id="polygon-perimeter-value">--</strong>
                </div>
                <div class="polygon-info-row">
                    <span>Points</span>
                    <strong id="point-count">0</strong>
                </div>
            </div>
        </div>

        <div class="panel divider">
            <div class="row">
                <div class="field">
                    <label for="lat">Latitude</label>
                    <input id="lat" type="number" min="-90" max="90" step="0.0001" value="32.8200">
                </div>
                <div class="field">
                    <label for="lon">Longitude</label>
                    <input id="lon" type="number" min="-180" max="180" step="0.0001" value="35.5900">
                </div>
            </div>
            <input id="point-radius" type="hidden" value="5">
        </div>

        <div class="panel">
            <div class="row">
                <div class="field">
                    <label for="build">Build</label>
                    <select id="build">
                        <option>Average</option>
                        <option>Thin</option>
                        <option selected>Fat</option>
                    </select>
                </div>
                <div class="field">
                    <label for="age">Age</label>
                    <input id="age" type="number" min="0" max="120" step="1" value="30">
                </div>
            </div>
        </div>

        <div class="panel">
            <div class="field">
                <label for="time-mode">Drowning Time Input</label>
                <select id="time-mode">
                    <option value="elapsed">Time Since Drowning</option>
                    <option value="exact">Exact Drowning Time</option>
                </select>
            </div>
            <div id="elapsed-hours-field" class="elapsed-row">
                <div class="field">
                    <label for="days">Days</label>
                    <input id="days" type="number" min="0" max="3" step="1" value="0">
                </div>
                <div class="field">
                    <label for="hours">Hours</label>
                    <input id="hours" type="number" min="0" max="72" step="1" value="4">
                </div>
                <div class="field">
                    <label for="minutes">Minutes</label>
                    <input id="minutes" type="number" min="0" max="59" step="1" value="0">
                </div>
            </div>
            <div id="exact-time-field" class="field hidden">
                <label for="drowning-time">Drowning time</label>
                <input id="drowning-time" type="datetime-local">
            </div>

            <div class="uncertainty-header">
                <label>Time Not Exact</label>
                <button id="uncertainty-toggle" class="uncertainty-toggle" type="button" aria-pressed="false">+/-</button>
            </div>
            <div id="uncertainty-group" class="field hidden">
                <label for="uncertainty">Range Minutes</label>
                <input id="uncertainty" type="number" min="0" step="5" value="30">
            </div>
            <input id="particles" type="hidden" value="1000">
        </div>

        <div class="panel manual-current hidden">
            <label class="toggle-row">
                <input id="manual-current-enabled" type="checkbox">
                Manual current override
            </label>
            <div class="row">
                <div class="field">
                    <label for="current-direction">Direction</label>
                    <input id="current-direction" type="number" min="0" max="360" step="1" value="270">
                </div>
                <div class="field">
                    <label for="current-speed">Speed m/s</label>
                    <input id="current-speed" type="number" min="0" max="2" step="0.05" value="0.2">
                </div>
            </div>
        </div>

        <div class="panel">
            <div class="actions">
                <button id="clear-button" class="secondary-button hidden" type="button">Clear Area</button>
                <button id="run-button" type="button">Recalculate Current Points</button>
            </div>
        </div>
    </aside>

    <main id="map"></main>

    <script>
        const API_URLS = [
            'http://127.0.0.1:8001/simulate_kinneret',
            'http://127.0.0.1:8002/simulate_kinneret'
        ];
        const map = L.map('map').setView([32.82, 35.59], 12);
        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
            attribution: 'Tiles &copy; Esri',
            maxZoom: 19
        }).addTo(map);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager_only_labels/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap contributors &copy; CARTO',
            subdomains: 'abcd',
            maxZoom: 20
        }).addTo(map);
        const gridLayer = L.layerGroup().addTo(map);

        function getGridStep(zoom) {
            if (zoom >= 16) return 0.001;
            if (zoom >= 14) return 0.002;
            if (zoom >= 12) return 0.005;
            if (zoom >= 10) return 0.01;
            return 0.02;
        }

        function updateGridLayer() {
            gridLayer.clearLayers();
            const bounds = map.getBounds().pad(0.02);
            const south = bounds.getSouth();
            const north = bounds.getNorth();
            const west = bounds.getWest();
            const east = bounds.getEast();
            const step = getGridStep(map.getZoom());
            const firstLat = Math.ceil(south / step) * step;
            const firstLon = Math.ceil(west / step) * step;
            const lineStyle = {
                color: '#00ffcc',
                weight: 1,
                opacity: 0.42,
                interactive: false
            };

            for (let lat = firstLat; lat <= north + step / 2; lat += step) {
                const normalizedLat = Number(lat.toFixed(6));
                L.polyline([[normalizedLat, west], [normalizedLat, east]], lineStyle).addTo(gridLayer);
            }

            for (let lon = firstLon; lon <= east + step / 2; lon += step) {
                const normalizedLon = Number(lon.toFixed(6));
                L.polyline([[south, normalizedLon], [north, normalizedLon]], lineStyle).addTo(gridLayer);
            }
        }

        let selectedPointMarker = null;
        let selectedPointRadius = null;
        let polygonPoints = [];
        let polygonVertexMarkers = [];
        let startShape = null;
        let heatLayer = null;
        let pathLayer = null;
        let beachedLayer = null;
        let centerMarker = null;
        let isPickingLocation = false;
        let isDrawingPolygon = false;
        let isTimeUncertaintyEnabled = false;

        function setStatus(message, isError = false) {
            const status = document.getElementById('status-message');
            status.textContent = message;
            status.classList.toggle('error', isError);
        }

        function setLoading(isLoading) {
            document.getElementById('run-button').disabled = isLoading;
            document.getElementById('clear-button').disabled = isLoading;
            document.getElementById('pick-location-button').disabled = isLoading;
            document.getElementById('pick-polygon-button').disabled = isLoading;
        }

        function clearLayer(layer) {
            if (layer) {
                map.removeLayer(layer);
            }
        }

        function clearResults() {
            clearLayer(heatLayer);
            clearLayer(pathLayer);
            clearLayer(beachedLayer);
            clearLayer(centerMarker);
            heatLayer = null;
            pathLayer = null;
            beachedLayer = null;
            centerMarker = null;
        }

        function formatArea(areaSqMeters) {
            if (areaSqMeters >= 1000000) {
                return `${(areaSqMeters / 1000000).toFixed(2)} km2`;
            }

            return `${Math.round(areaSqMeters).toLocaleString()} m2`;
        }

        function formatDistance(distanceMeters) {
            if (distanceMeters >= 1000) {
                return `${(distanceMeters / 1000).toFixed(2)} km`;
            }

            return `${Math.round(distanceMeters)} m`;
        }

        function getDistanceMeters(pointA, pointB) {
            const earthRadiusMeters = 6371000;
            const lat1 = pointA[0] * Math.PI / 180;
            const lat2 = pointB[0] * Math.PI / 180;
            const deltaLat = (pointB[0] - pointA[0]) * Math.PI / 180;
            const deltaLon = (pointB[1] - pointA[1]) * Math.PI / 180;
            const haversine =
                Math.sin(deltaLat / 2) ** 2
                + Math.cos(lat1) * Math.cos(lat2) * Math.sin(deltaLon / 2) ** 2;
            return earthRadiusMeters * 2 * Math.atan2(Math.sqrt(haversine), Math.sqrt(1 - haversine));
        }

        function getPolygonAreaSqMeters(points) {
            if (points.length < 3) return 0;

            const earthRadiusMeters = 6378137;
            let area = 0;

            points.forEach((point, index) => {
                const nextPoint = points[(index + 1) % points.length];
                const lon1 = point[1] * Math.PI / 180;
                const lon2 = nextPoint[1] * Math.PI / 180;
                const lat1 = point[0] * Math.PI / 180;
                const lat2 = nextPoint[0] * Math.PI / 180;
                area += (lon2 - lon1) * (2 + Math.sin(lat1) + Math.sin(lat2));
            });

            return Math.abs(area * earthRadiusMeters * earthRadiusMeters / 2);
        }

        function getPolygonPerimeterMeters(points) {
            if (points.length < 2) return 0;

            return points.reduce((total, point, index) => {
                const nextPoint = points[(index + 1) % points.length];
                return total + getDistanceMeters(point, nextPoint);
            }, 0);
        }

        function updatePolygonInfo() {
            const polygonInfo = document.getElementById('polygon-info');
            const pointCount = document.getElementById('point-count');
            const areaValue = document.getElementById('polygon-area-value');
            const perimeterValue = document.getElementById('polygon-perimeter-value');
            pointCount.textContent = String(polygonPoints.length);

            if (polygonPoints.length === 0) {
                polygonInfo.classList.add('hidden');
                areaValue.textContent = '--';
                perimeterValue.textContent = '--';
                return;
            }

            polygonInfo.classList.remove('hidden');

            if (polygonPoints.length < 3) {
                areaValue.textContent = '--';
                perimeterValue.textContent = '--';
                return;
            }

            areaValue.textContent = formatArea(getPolygonAreaSqMeters(polygonPoints));
            perimeterValue.textContent = formatDistance(getPolygonPerimeterMeters(polygonPoints));
        }

        function getPolygonCenter(points) {
            return {
                lat: points.reduce((total, point) => total + point[0], 0) / points.length,
                lon: points.reduce((total, point) => total + point[1], 0) / points.length
            };
        }

        function redrawStartShape() {
            clearLayer(startShape);
            startShape = null;
            updatePolygonInfo();

            if (polygonPoints.length >= 3) {
                startShape = L.polygon(polygonPoints, {
                    color: '#ffbf47',
                    weight: 3,
                    fillColor: '#ffbf47',
                    fillOpacity: 0.18
                }).addTo(map).bindPopup('Kinneret start polygon');
            } else if (polygonPoints.length >= 2) {
                startShape = L.polyline(polygonPoints, {
                    color: '#ffbf47',
                    weight: 3,
                    dashArray: '6, 8'
                }).addTo(map);
            }
        }

        function setSelectedPoint(lat, lon, openPopup = true) {
            document.getElementById('lat').value = lat.toFixed(4);
            document.getElementById('lon').value = lon.toFixed(4);
            const pointRadius = Math.max(5, Math.min(1000, Number(document.getElementById('point-radius').value) || 5));

            if (selectedPointMarker) {
                map.removeLayer(selectedPointMarker);
            }

            if (selectedPointRadius) {
                map.removeLayer(selectedPointRadius);
            }

            selectedPointRadius = L.circle([lat, lon], {
                radius: pointRadius,
                color: '#ff4b45',
                weight: 2,
                fillColor: '#ff4b45',
                fillOpacity: 0.16
            }).addTo(map);

            selectedPointMarker = L.circleMarker([lat, lon], {
                radius: 10,
                color: '#ffffff',
                weight: 3,
                fillColor: '#ff4b45',
                fillOpacity: 1
            }).addTo(map).bindPopup('<b>Last Seen Point</b><br>Calculating drift vectors...');

            if (openPopup) {
                selectedPointMarker.openPopup();
            }
        }

        function clearSelectedPoint() {
            if (selectedPointMarker) {
                map.removeLayer(selectedPointMarker);
                selectedPointMarker = null;
            }

            if (selectedPointRadius) {
                map.removeLayer(selectedPointRadius);
                selectedPointRadius = null;
            }
        }

        function clearPolygon() {
            polygonPoints = [];
            polygonVertexMarkers.forEach(marker => map.removeLayer(marker));
            polygonVertexMarkers = [];
            clearLayer(startShape);
            startShape = null;
            updatePolygonInfo();
        }

        function clearSelection() {
            clearPolygon();
            clearResults();
            setStatus('Ready.');
        }

        function addPolygonPoint(latlng) {
            const point = [latlng.lat, latlng.lng];
            polygonPoints.push(point);

            const marker = L.circleMarker(point, {
                radius: 6,
                color: '#121212',
                weight: 2,
                fillColor: '#ffbf47',
                fillOpacity: 1
            }).addTo(map).bindPopup(`Point ${polygonPoints.length}`);

            polygonVertexMarkers.push(marker);
            redrawStartShape();
            setStatus(`${polygonPoints.length} point${polygonPoints.length === 1 ? '' : 's'} selected.`);
        }

        function setPickLocationMode(isActive) {
            isPickingLocation = isActive;
            document.getElementById('pick-location-button').classList.toggle('active', isActive);

            if (isActive) {
                setPolygonMode(false);
                setStatus('Pick a point on Lake Kinneret.');
            }
        }

        function setPolygonMode(isActive) {
            isDrawingPolygon = isActive;
            document.getElementById('pick-polygon-button').classList.toggle('active', isActive);

            if (isActive) {
                setPickLocationMode(false);
                clearSelectedPoint();
                clearPolygon();
                setStatus('Draw an area on Lake Kinneret.');
            } else if (polygonPoints.length >= 3) {
                const center = getPolygonCenter(polygonPoints);
                document.getElementById('lat').value = center.lat.toFixed(4);
                document.getElementById('lon').value = center.lon.toFixed(4);
                setStatus(`Area selected: ${formatArea(getPolygonAreaSqMeters(polygonPoints))}.`);
            }
        }

        function getSelectedPosition() {
            const lat = numberInput('lat');
            const lon = numberInput('lon');

            if (!Number.isFinite(lat) || lat < -90 || lat > 90) {
                throw new Error('Enter a valid latitude between -90 and 90.');
            }

            if (!Number.isFinite(lon) || lon < -180 || lon > 180) {
                throw new Error('Enter a valid longitude between -180 and 180.');
            }

            return {lat, lon};
        }

        function makePointPolygon(lat, lon, radiusMeters) {
            const metersPerDegreeLat = 111000;
            const metersPerDegreeLon = 111000 * Math.cos(lat * Math.PI / 180);
            const deltaLat = radiusMeters / metersPerDegreeLat;
            const deltaLon = radiusMeters / Math.max(Math.abs(metersPerDegreeLon), 1);

            return [
                [lat - deltaLat, lon - deltaLon],
                [lat - deltaLat, lon + deltaLon],
                [lat + deltaLat, lon + deltaLon],
                [lat + deltaLat, lon - deltaLon]
            ];
        }

        function numberInput(id) {
            return Number(document.getElementById(id).value);
        }

        function toLocalDateTimeInputValue(date) {
            const localDate = new Date(date.getTime() - date.getTimezoneOffset() * 60000);
            return localDate.toISOString().slice(0, 16);
        }

        function setTimeMode(mode) {
            document.getElementById('elapsed-hours-field').classList.toggle('hidden', mode !== 'elapsed');
            document.getElementById('exact-time-field').classList.toggle('hidden', mode !== 'exact');
        }

        function setTimeUncertaintyEnabled(isEnabled) {
            isTimeUncertaintyEnabled = isEnabled;
            const toggle = document.getElementById('uncertainty-toggle');
            toggle.classList.toggle('active', isEnabled);
            toggle.setAttribute('aria-pressed', String(isEnabled));
            document.getElementById('uncertainty-group').classList.toggle('hidden', !isEnabled);
        }

        function getSimulationHoursAndPayload(body) {
            const mode = document.getElementById('time-mode').value;

            if (mode === 'exact') {
                const rawValue = document.getElementById('drowning-time').value;
                if (!rawValue) {
                    throw new Error('Enter the drowning time.');
                }

                const drowningDate = new Date(rawValue);
                const elapsedHours = (Date.now() - drowningDate.getTime()) / 3600000;

                if (!Number.isFinite(elapsedHours) || elapsedHours <= 0) {
                    throw new Error('The drowning time must be in the past.');
                }

                if (elapsedHours > 72) {
                    throw new Error('Use a drowning time within the last 72 hours.');
                }

                body.drowning_time = drowningDate.toISOString();
                return elapsedHours;
            }

            const days = numberInput('days');
            const hours = numberInput('hours');
            const minutes = numberInput('minutes');

            if (!Number.isFinite(days) || days < 0 || !Number.isFinite(hours) || hours < 0 || !Number.isFinite(minutes) || minutes < 0 || minutes >= 60) {
                throw new Error('Enter valid days, hours, and minutes.');
            }

            const elapsedHours = days * 24 + hours + minutes / 60;
            if (!Number.isFinite(elapsedHours) || elapsedHours <= 0 || elapsedHours > 72) {
                throw new Error('Use a time since drowning between 1 minute and 72 hours.');
            }

            body.hours = elapsedHours;
            return elapsedHours;
        }

        function buildRequestBody() {
            const {lat, lon} = getSelectedPosition();
            const pointRadius = numberInput('point-radius');
            const timeUncertaintyMinutes = isTimeUncertaintyEnabled ? numberInput('uncertainty') : 0;
            const particles = Math.round(numberInput('particles'));

            if (!Number.isFinite(pointRadius) || pointRadius < 1 || pointRadius > 1000) {
                throw new Error('Point radius must be between 1 and 1000 meters.');
            }

            if (!Number.isFinite(timeUncertaintyMinutes) || timeUncertaintyMinutes < 0) {
                throw new Error('Time uncertainty must be zero or positive.');
            }

            if (!Number.isInteger(particles) || particles < 1 || particles > 5000) {
                throw new Error('Particles must be between 1 and 5000.');
            }

            const requestPolygon = polygonPoints.length >= 3
                ? polygonPoints
                : makePointPolygon(lat, lon, pointRadius);

            if (polygonPoints.length < 3) {
                clearLayer(startShape);
                startShape = L.circle([lat, lon], {
                    radius: pointRadius,
                    color: '#ffbf47',
                    weight: 2,
                    fillColor: '#ffbf47',
                    fillOpacity: 0.16
                }).addTo(map).bindPopup('Point start area');
            }

            const body = {
                polygon: requestPolygon.map(point => ({lat: point[0], lon: point[1]})),
                time_uncertainty_minutes: timeUncertaintyMinutes,
                particles
            };

            const elapsedHours = getSimulationHoursAndPayload(body);

            if (timeUncertaintyMinutes / 60 >= elapsedHours) {
                throw new Error('Time uncertainty must be smaller than the requested time.');
            }

            if (document.getElementById('manual-current-enabled').checked) {
                body.manual_current = {
                    enabled: true,
                    direction_degrees: numberInput('current-direction'),
                    speed_mps: numberInput('current-speed')
                };
            }

            return body;
        }

        function buildHeatPoints(particles) {
            const nonBeachedParticles = particles.filter(point => !point.beached);
            const sourceParticles = nonBeachedParticles.length > 0 ? nonBeachedParticles : particles;
            const densityByKey = new Map();

            sourceParticles.forEach(point => {
                const key = `${point.lat.toFixed(4)}:${point.lon.toFixed(4)}`;
                densityByKey.set(key, (densityByKey.get(key) || 0) + 1);
            });

            const maxDensity = Math.max(1, ...Array.from(densityByKey.values()));

            return sourceParticles.map(point => {
                const key = `${point.lat.toFixed(4)}:${point.lon.toFixed(4)}`;
                const density = densityByKey.get(key) || 1;
                const intensity = Math.max(0.25, Math.min(1, density / maxDensity));
                return [point.lat, point.lon, intensity];
            });
        }

        function drawHeatLayer(result) {
            const heatPoints = buildHeatPoints(result.final_particles);
            heatLayer = L.heatLayer(heatPoints, {
                radius: 28,
                blur: 14,
                maxZoom: 12,
                gradient: {0.22: 'blue', 0.45: 'lime', 0.72: 'orange', 1: 'red'}
            }).addTo(map);

            return heatPoints;
        }

        function drawResult(result) {
            clearResults();

            drawHeatLayer(result);

            pathLayer = L.layerGroup().addTo(map);
            if (Array.isArray(result.likely_path) && result.likely_path.length > 1) {
                const latLngs = result.likely_path.map(point => [point.lat, point.lon]);
                L.polyline(latLngs, {
                    color: '#00ffcc',
                    weight: 4,
                    opacity: 0.95,
                    dashArray: '7, 8'
                }).addTo(pathLayer).bindPopup('Most likely drift path');
            }

            beachedLayer = L.layerGroup().addTo(map);
            result.final_particles
                .filter(point => point.beached)
                .slice(0, 200)
                .forEach(point => {
                    L.circleMarker([point.lat, point.lon], {
                        radius: 4,
                        color: '#ff4b45',
                        fillColor: '#ff4b45',
                        fillOpacity: 0.8,
                        weight: 1
                    }).addTo(beachedLayer);
                });

            const boundsPoints = result.final_particles.map(point => [point.lat, point.lon]).concat(polygonPoints);
            map.fitBounds(L.latLngBounds(boundsPoints).pad(0.18));

            const beachedCount = result.final_particles.filter(point => point.beached).length;
            const currentText = result.current_source && result.current_source !== 'none'
                ? ` + ${result.current_source}`
                : '';
            const beachedText = beachedCount > 0 ? ` Beached: ${beachedCount}.` : '';
            setStatus(`Calculated ${result.hours_requested} hours from ${result.wind_source}${currentText}.${beachedText}`);
        }

        async function runSimulation() {
            try {
                if (isDrawingPolygon) {
                    if (polygonPoints.length < 3) {
                        throw new Error('Add at least 3 polygon points.');
                    }

                    setPolygonMode(false);
                }

                const body = buildRequestBody();
                setLoading(true);
                setStatus('Running Kinneret simulation...');

                let result = null;
                let lastError = null;

                for (const apiUrl of API_URLS) {
                    try {
                        const response = await fetch(apiUrl, {
                            method: 'POST',
                            headers: {'Content-Type': 'application/json'},
                            body: JSON.stringify(body)
                        });
                        const candidate = await response.json();

                        if (!response.ok) {
                            throw new Error(candidate.detail || 'Simulation failed.');
                        }

                        result = candidate;
                        break;
                    } catch (error) {
                        lastError = error;
                    }
                }

                if (!result) {
                    throw lastError || new Error('Simulation failed.');
                }

                drawResult(result);
            } catch (error) {
                console.error(error);
                setStatus(error.message, true);
            } finally {
                setLoading(false);
            }
        }

        map.on('moveend zoomend', updateGridLayer);
        updateGridLayer();

        map.on('click', event => {
            if (isDrawingPolygon) {
                addPolygonPoint(event.latlng);
                return;
            }

            setSelectedPoint(event.latlng.lat, event.latlng.lng);
            clearPolygon();
            clearResults();

            if (isPickingLocation) {
                setPickLocationMode(false);
            }

            setStatus('Point selected.');
        });

        document.getElementById('pick-location-button').addEventListener('click', () => {
            setPickLocationMode(!isPickingLocation);
        });
        document.getElementById('pick-polygon-button').addEventListener('click', () => {
            if (isDrawingPolygon) {
                if (polygonPoints.length < 3) {
                    setStatus('Add at least 3 polygon points.', true);
                    return;
                }

                setPolygonMode(false);
                return;
            }

            setPolygonMode(true);
        });
        document.getElementById('clear-button').addEventListener('click', clearSelection);
        document.getElementById('run-button').addEventListener('click', runSimulation);

        function syncPointFromInputs() {
            try {
                const {lat, lon} = getSelectedPosition();
                setSelectedPoint(lat, lon, false);
                clearPolygon();
                clearResults();
                setStatus('Point selected.');
            } catch (error) {
                setStatus(error.message, true);
            }
        }

        document.getElementById('lat').addEventListener('change', syncPointFromInputs);
        document.getElementById('lon').addEventListener('change', syncPointFromInputs);
        document.getElementById('point-radius').addEventListener('change', syncPointFromInputs);
        document.getElementById('time-mode').addEventListener('change', event => {
            setTimeMode(event.target.value);
        });
        document.getElementById('uncertainty-toggle').addEventListener('click', () => {
            setTimeUncertaintyEnabled(!isTimeUncertaintyEnabled);
        });

        document.getElementById('drowning-time').value = toLocalDateTimeInputValue(new Date(Date.now() - 6 * 3600000));
        setTimeMode(document.getElementById('time-mode').value);
        setTimeUncertaintyEnabled(false);
        setSelectedPoint(32.82, 35.59, false);
    </script>
</body>
</html>
